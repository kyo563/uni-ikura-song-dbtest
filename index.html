<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>雲丹ゐくら Songs DB TEST</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #111827;
      --surface-2: #1f2937;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --line: #334155;
      --primary: #38bdf8;
      --accent: #22d3ee;
      --danger: #f87171;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      background: radial-gradient(circle at top left, #1e293b 0%, var(--bg) 55%);
      color: var(--text);
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .card {
      background: color-mix(in srgb, var(--surface) 90%, black 10%);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
    }

    h1 { margin: 0 0 6px; font-size: 22px; }
    .muted { color: var(--muted); font-size: 13px; }

    .filters {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    @media (max-width: 860px) {
      .filters { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 500px) {
      .filters { grid-template-columns: 1fr; }
    }

    label { display: grid; gap: 6px; font-size: 13px; color: var(--muted); }

    input, select {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--text);
      padding: 9px 10px;
      font-size: 15px;
    }

    .actions {
      margin-top: 10px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface-2);
      color: var(--text);
      padding: 8px 12px;
      cursor: pointer;
    }

    button.primary {
      border-color: #0369a1;
      background: linear-gradient(180deg, var(--primary), #0ea5e9);
      color: #001018;
      font-weight: 700;
    }

    table { width: 100%; border-collapse: collapse; }
    th, td {
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      padding: 9px 8px;
      font-size: 14px;
    }

    th { color: var(--muted); font-weight: 600; font-size: 12px; }

    .tag {
      display: inline-block;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      background: #0b2232;
      color: var(--accent);
    }

    .status { font-size: 12px; color: var(--muted); }
    .error { color: var(--danger); }
  </style>
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>雲丹ゐくら Songs DB TEST</h1>
      <p class="muted">kasane-3kHz-songs-dbTEST 構成に合わせ、Cloudflare R2 + Worker API 経由で参照するUIに更新。チェック済みかつ公開期間内のデータのみ表示します。</p>
    </section>

    <section class="card">
      <div class="filters">
        <label>検索
          <input id="q" type="search" placeholder="曲名 / アーティスト / メモ">
        </label>
        <label>種別
          <select id="kind">
            <option value="all">すべて</option>
            <option value="cover">歌ってみた</option>
            <option value="original">オリジナル</option>
            <option value="short">short</option>
          </select>
        </label>
        <label>並び順
          <select id="sort">
            <option value="latest">新しい順</option>
            <option value="oldest">古い順</option>
            <option value="title">タイトル順</option>
            <option value="artist">アーティスト順</option>
          </select>
        </label>
        <label>件数
          <select id="limit">
            <option>20</option>
            <option selected>50</option>
            <option>100</option>
            <option>200</option>
          </select>
        </label>
      </div>
      <div class="actions">
        <button class="primary" id="reload">再読み込み</button>
        <button id="clear">条件クリア</button>
        <span class="status" id="status">初期化中...</span>
      </div>
    </section>

    <section class="card">
      <table>
        <thead>
          <tr>
            <th>タイトル</th>
            <th>アーティスト</th>
            <th>種別</th>
            <th>公開日</th>
            <th>リンク</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>
  </main>

  <script>
    const state = {
      q: '',
      kind: 'all',
      sort: 'latest',
      limit: 50,
    };

    const byId = id => document.getElementById(id);
    const status = byId('status');
    const rows = byId('rows');
    const cachePrefix = 'songs-cache-v1';


    function cacheKey() {
      return `${cachePrefix}:${state.q}|${state.kind}|${state.sort}|${state.limit}`;
    }

    function loadCache() {
      try {
        const raw = localStorage.getItem(cacheKey());
        return raw ? JSON.parse(raw) : null;
      } catch (_) {
        return null;
      }
    }

    function saveCache(entry) {
      try {
        localStorage.setItem(cacheKey(), JSON.stringify(entry));
      } catch (_) {
        // ignore cache error
      }
    }

    function fmtDate(value) {
      if (!value) return '-';
      const d = new Date(value);
      return Number.isNaN(d.getTime()) ? value : d.toLocaleDateString('ja-JP');
    }

    function render(items) {
      if (!items.length) {
        rows.innerHTML = '<tr><td colspan="5" class="muted">該当データがありません</td></tr>';
        return;
      }

      rows.innerHTML = items.map(item => `
        <tr>
          <td>${escapeHtml(item.title || '-')}</td>
          <td>${escapeHtml(item.artist || '-')}</td>
          <td><span class="tag">${escapeHtml(item.kind || 'other')}</span></td>
          <td>${escapeHtml(fmtDate(item.publishedAt))}</td>
          <td>${item.url ? `<a href="${encodeURI(item.url)}" target="_blank" rel="noopener noreferrer">再生</a>` : '-'}</td>
        </tr>
      `).join('');
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    async function load() {
      status.textContent = '読み込み中...';
      status.classList.remove('error');

      const params = new URLSearchParams({
        q: state.q,
        kind: state.kind,
        sort: state.sort,
        limit: String(state.limit),
      });

      const cached = loadCache();
      if (cached?.payload?.items) {
        render(Array.isArray(cached.payload.items) ? cached.payload.items : []);
        status.textContent = `キャッシュ表示 ${cached.payload.count ?? 0} / 総数 ${cached.payload.total ?? 0}`;
      }

      try {
        const res = await fetch(`/api/songs?${params.toString()}`, {
          headers: cached?.etag ? { 'If-None-Match': cached.etag } : {},
        });

        if (res.status === 304 && cached?.payload) {
          status.textContent = `更新なし（ETag） 表示 ${cached.payload.count ?? 0} / 総数 ${cached.payload.total ?? 0}`;
          return;
        }

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const payload = await res.json();
        const etag = res.headers.get('etag');
        render(Array.isArray(payload.items) ? payload.items : []);
        status.textContent = `表示 ${payload.count ?? 0} / 総数 ${payload.total ?? 0}`;

        if (etag) {
          saveCache({ etag, payload });
        }
      } catch (err) {
        console.error(err);
        if (!cached?.payload) {
          rows.innerHTML = '<tr><td colspan="5" class="error">データ取得に失敗しました。Worker / R2 の設定を確認してください。</td></tr>';
        }
        status.classList.add('error');
        status.textContent = `エラー: ${err.message}`;
      }
    }

    function bind() {
      byId('q').addEventListener('input', e => { state.q = e.target.value.trim(); });
      byId('kind').addEventListener('change', e => { state.kind = e.target.value; });
      byId('sort').addEventListener('change', e => { state.sort = e.target.value; });
      byId('limit').addEventListener('change', e => { state.limit = Number(e.target.value); });

      byId('reload').addEventListener('click', load);
      byId('clear').addEventListener('click', () => {
        state.q = '';
        state.kind = 'all';
        state.sort = 'latest';
        state.limit = 50;
        byId('q').value = '';
        byId('kind').value = 'all';
        byId('sort').value = 'latest';
        byId('limit').value = '50';
        load();
      });
    }

    bind();
    load();
  </script>
</body>
</html>
