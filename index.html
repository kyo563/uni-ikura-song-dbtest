<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>雲丹ゐくら Songs DB TEST</title>
  <style>
    :root {
      --surface: #111827;
      --surface-2: #1f2937;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --line: #334155;
      --primary: #38bdf8;
      --accent: #22d3ee;
      --danger: #f87171;
      --focus: #f59e0b;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      background: #ffffff;
      color: var(--text);
    }

    .container { max-width: 1080px; margin: 0 auto; display: grid; gap: 16px; }
    .card {
      background: color-mix(in srgb, var(--surface) 90%, black 10%);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
    }

    h1 { margin: 0 0 6px; font-size: 22px; }
    h2 { margin: 0 0 12px; font-size: 17px; }
    .muted { color: var(--muted); font-size: 13px; }
    .status-shell {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-left: 6px;
      padding: 3px 10px 3px 8px;
      border-radius: 999px;
      border: 1px solid color-mix(in srgb, var(--line) 85%, white 15%);
      background: color-mix(in srgb, var(--surface-2) 88%, black 12%);
      overflow: hidden;
      transition: border-color 0.25s ease, background-color 0.25s ease, opacity 0.25s ease;
      opacity: 0.7;
    }

    .status-shell::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 20%, rgb(255 255 255 / 12%) 50%, transparent 80%);
      transform: translateX(-130%);
      opacity: 0;
      pointer-events: none;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #64748b;
      flex: 0 0 auto;
      box-shadow: 0 0 0 2px rgb(15 23 42 / 45%);
      transition: background-color 0.25s ease;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
      transition: color 0.25s ease;
    }

    .status-shell[data-state="ok"] {
      border-color: color-mix(in srgb, var(--line) 88%, #10b981 12%);
      background: color-mix(in srgb, var(--surface-2) 94%, #10b981 6%);
      opacity: 0.62;
    }

    .status-shell[data-state="ok"] .status-dot {
      background: #34d399;
    }

    .status-shell[data-state="loading"] {
      opacity: 0.82;
    }

    .status-shell[data-state="loading"]::before {
      opacity: 1;
      animation: status-shimmer 3.2s ease-in-out infinite;
    }

    .status-shell[data-state="loading"] .status-dot {
      background: #38bdf8;
      animation: status-pulse-soft 2s ease-in-out infinite;
    }

    .status-shell[data-state="error"] {
      border-color: color-mix(in srgb, var(--danger) 55%, #7f1d1d 45%);
      background: color-mix(in srgb, var(--surface-2) 82%, #7f1d1d 18%);
      opacity: 1;
      animation: status-pulse-alert 1.2s ease-in-out infinite;
    }

    .status-shell[data-state="error"] .status-dot {
      background: var(--danger);
      box-shadow: 0 0 0 2px rgb(127 29 29 / 35%), 0 0 10px rgb(248 113 113 / 45%);
    }

    .status-shell[data-state="error"] .status {
      color: #fecaca;
    }

    @keyframes status-pulse-soft {
      0%, 100% { transform: scale(1); opacity: 0.75; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    @keyframes status-shimmer {
      0% { transform: translateX(-130%); }
      100% { transform: translateX(130%); }
    }

    @keyframes status-pulse-alert {
      0%, 100% { box-shadow: 0 0 0 0 rgb(248 113 113 / 0%); }
      50% { box-shadow: 0 0 0 3px rgb(248 113 113 / 15%); }
    }

    @media (prefers-reduced-motion: reduce) {
      .status-shell,
      .status-shell::before,
      .status-dot {
        animation: none !important;
        transition: none;
      }
    }

    label { display: grid; gap: 6px; font-size: 13px; color: var(--muted); }

    .card :is(input, select) {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--text);
      min-height: 42px;
      padding: 9px 10px;
      font-size: 15px;
    }

    .card button {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface-2);
      color: var(--text);
      min-height: 42px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 14px;
    }

    button.primary {
      border-color: #0369a1;
      background: linear-gradient(180deg, var(--primary), #0ea5e9);
      color: #001018;
      font-weight: 700;
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    a:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }

    .top-form {
      position: relative;
      padding-bottom: 50px;
      overflow: hidden;
      transition: max-height 0.2s ease;
      max-height: 900px;
    }

    .top-summary {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-bottom: 10px;
    }

    .summary-box {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface-2);
      min-height: 42px;
      display: flex;
      align-items: center;
      padding: 8px 10px;
      font-size: 13px;
      color: var(--text);
    }

    .error-log-wrap {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface-2);
      padding: 10px;
      display: none;
      gap: 8px;
    }

    .error-log-wrap.show {
      display: grid;
    }

    .error-log-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .error-log {
      margin: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0b1220;
      color: #dbeafe;
      padding: 10px;
      max-height: 280px;
      overflow: auto;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .top-advanced {
      display: grid;
      gap: 10px;
      grid-template-columns: 1.8fr 1.2fr auto;
      align-items: end;
    }

    .top-form.collapsed {
      max-height: 182px;
    }

    .top-form.collapsed .top-advanced { display: none; }

    .toggle-wrap {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 140px;
      display: flex;
      justify-content: flex-end;
    }

    .checkbox-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      padding-top: 2px;
    }

    .checkbox-row label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text);
    }

    .checkbox-row input { width: auto; min-height: auto; }

    .bottom-grid {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr;
      align-items: end;
    }

    .ratio-8-2 {
      display: grid;
      gap: 8px;
      grid-template-columns: 8fr 2fr;
      align-items: end;
    }

    .bottom-swipe-wrap {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: color-mix(in srgb, var(--surface-2) 90%, black 10%);
    }

    .bottom-swipe-track {
      display: flex;
      width: 200%;
      transform: translateX(0%);
      transition: transform 0.45s cubic-bezier(0.2, 0.9, 0.2, 1);
      touch-action: pan-y;
    }

    .bottom-swipe-track.dragging {
      transition: none;
      cursor: grabbing;
    }

    .bottom-panel {
      width: 50%;
      padding: 8px;
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .swipe-back-button {
      min-height: auto;
      padding: 2px 6px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
      border-radius: 8px;
    }

    .swipe-back-button:not(:disabled) {
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .swipe-back-button:disabled {
      cursor: default;
      opacity: 0.7;
    }

    @media (max-width: 860px) {
      .top-summary { grid-template-columns: 1fr; }
      .top-advanced { grid-template-columns: 1fr; }
      .ratio-8-2 { grid-template-columns: 1fr; }
    }

    .song-cards {
      display: grid;
      gap: 6px;
      max-height: 54vh;
      overflow-y: auto;
      padding-right: 2px;
    }

    .song-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: color-mix(in srgb, var(--surface-2) 88%, black 12%);
      padding: 10px;
      transition: margin 0.15s ease, border-color 0.15s ease;
      cursor: pointer;
      scroll-snap-align: start;
    }

    .song-card.expanded {
      margin: 5px 0;
      border-color: var(--accent);
    }

    .song-summary { display: grid; gap: 2px; font-size: 14px; }
    .song-title { font-weight: 700; }
    .song-artist { color: var(--muted); font-size: 13px; }

    .song-details {
      display: none;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--line);
      gap: 8px;
      font-size: 13px;
    }

    .song-card.expanded .song-details {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      align-items: center;
    }

    .song-meta { display: grid; gap: 4px; min-width: 0; }

    .icon-btn {
      min-width: 38px;
      min-height: 34px;
      padding: 6px 10px;
    }

    html.snap-active { scroll-snap-type: y proximity; }

    .tag {
      display: inline-block;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      background: #0b2232;
      color: var(--accent);
    }

    #scrollTop {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      display: none;
    }

    #scrollTop.show { display: inline-flex; }

    .my-danmaku-form {
      display: grid;
      gap: 8px;
    }

    #myEmoji {
      width: 7ch;
      min-width: 7ch;
      padding-left: 8px;
      padding-right: 8px;
    }

    .my-danmaku-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

  </style>
</head>
<body>
  <main class="container" id="songsPage">
    <section class="card top-form" id="topForm">
      <div class="top-summary">
        <div class="summary-box">サーバー状態表示:
          <span class="status-shell" id="statusShell" data-state="loading">
            <span class="status-dot" aria-hidden="true"></span>
            <span class="status" id="status">初期化中...</span>
          </span>
        </div>
        <div class="summary-box">選択されている楽曲数: <span id="selectedCount">0</span> 曲</div>
      </div>

      <div id="errorLogWrap" class="error-log-wrap" aria-live="polite">
        <div class="error-log-head">
          <strong>詳細エラーログ（AI解析用）</strong>
          <button id="copyErrorLog" type="button">エラーログをコピー</button>
        </div>
        <pre id="errorLog" class="error-log">エラー発生時にここへ詳細を表示します。</pre>
      </div>

      <div class="top-advanced">
        <label>絞り込みメニュー
          <div class="checkbox-row">
            <label><input type="checkbox" id="kindLive" checked>歌枠</label>
            <label><input type="checkbox" id="kindCover" checked>歌ってみた</label>
            <label><input type="checkbox" id="kindShort" checked>ショート</label>
          </div>
        </label>
        <label>表示切替メニュー
          <select id="sortMode">
            <option value="artist-asc">アーティスト名 昇順</option>
            <option value="artist-desc">アーティスト名 降順</option>
            <option value="title-asc">楽曲名 昇順</option>
            <option value="title-desc">楽曲名 降順</option>
            <option value="date-asc">投稿日付 昇順</option>
            <option value="date-desc" selected>投稿日付 降順</option>
          </select>
        </label>
      </div>

      <div class="toggle-wrap">
        <button id="collapseToggle" type="button">折り畳み</button>
      </div>
    </section>

    <section class="card middle-form">
      <div id="rows" class="song-cards"></div>
    </section>

    <section class="card bottom-form">
      <div class="bottom-swipe-wrap" id="bottomSwipeWrap">
        <div class="bottom-swipe-track" id="bottomSwipeTrack">
          <section class="bottom-panel" aria-label="検索フォームカード">
            <div class="bottom-grid">
              <div class="ratio-8-2">
                <label>検索テキスト
                  <input id="q" type="search" placeholder="曲名 / アーティスト / メモ">
                </label>
                <button id="clear" type="button">検索クリア</button>
              </div>
              <div class="ratio-8-2">
                <label>弾幕選択カラム
                  <select id="danmakuType">
                    <option value="title">曲名</option>
                    <option value="artist">アーティスト</option>
                    <option value="full">曲名 + アーティスト</option>
                    <option value="my">マイ弾幕</option>
                  </select>
                </label>
                <button class="primary" id="copyDanmaku" type="button">弾幕コピー</button>
              </div>
            </div>
          </section>

          <section class="bottom-panel my-danmaku-form" aria-label="マイ弾幕カード">
            <input id="myEmoji" type="text" placeholder="🎉" maxlength="20" aria-label="絵文字入力">
            <div class="my-danmaku-actions">
              <button class="primary" id="saveMyDanmaku" type="button">この内容を使う</button>
              <button id="swipeBackButton" class="swipe-back-button" type="button" disabled>戻るヘルプ</button>
            </div>
          </section>
        </div>
      </div>

    </section>
  </main>

  <button id="scrollTop" class="primary" type="button">↑ 上へ</button>

  <script>
    const DEFAULT_KINDS = ['cover', 'short', 'live'];
    const KIND_MAP = { cover: 'cover', short: 'short', live: 'live', stream: 'live' };
    const KIND_LABELS = { cover: '歌ってみた', short: 'ショート', live: '歌枠', other: 'その他' };
    const CACHE_PREFIX = 'songs-cache-v3';
    const MY_DANMAKU_CACHE_KEY = 'my-danmaku-cache-v1';
    const MY_DANMAKU_CACHE_MS = 15 * 60 * 1000;

    const state = {
      q: '',
      kinds: [...DEFAULT_KINDS],
      sortMode: 'date-desc',
      selectedSongId: '',
      expandedSongId: '',
      myDanmaku: '',
    };

    const byId = (id) => document.getElementById(id);
    const status = byId('status');
    const rows = byId('rows');
    const selectedCount = byId('selectedCount');
    const errorLogWrap = byId('errorLogWrap');
    const errorLog = byId('errorLog');
    const MAX_ERROR_BODY_CHARS = 4000;
    let latestErrorLogText = '';

    const statusShell = byId('statusShell');

    function setStatus(text, isError = false) {
      status.textContent = text;
      if (isError) {
        statusShell.dataset.state = 'error';
        return;
      }
      statusShell.dataset.state = text.includes('読み込み中') ? 'loading' : 'ok';
    }

    function clipText(value, max = MAX_ERROR_BODY_CHARS) {
      const text = String(value ?? '');
      if (text.length <= max) return text;
      return `${text.slice(0, max)}\n...<truncated ${text.length - max} chars>`;
    }

    function headersToObject(headers) {
      const picked = ['content-type', 'cache-control', 'etag', 'cf-ray', 'server', 'date'];
      const obj = {};
      for (const key of picked) {
        const value = headers.get(key);
        if (value) obj[key] = value;
      }
      return obj;
    }

    function setErrorLog(logObject) {
      latestErrorLogText = JSON.stringify(logObject, null, 2);
      errorLog.textContent = latestErrorLogText;
      errorLogWrap.classList.add('show');
      console.error('songs-db-detailed-error', logObject);
    }

    function clearErrorLog() {
      latestErrorLogText = '';
      errorLog.textContent = 'エラー発生時にここへ詳細を表示します。';
      errorLogWrap.classList.remove('show');
    }

    async function copyErrorLog() {
      if (!latestErrorLogText) {
        setStatus('コピー可能なエラーログはありません', true);
        return;
      }
      try {
        await navigator.clipboard.writeText(latestErrorLogText);
        setStatus('詳細エラーログをコピーしました');
      } catch (_) {
        setStatus('エラーログのコピーに失敗しました', true);
      }
    }

    function updateSwipeUi(index) {
      const isMyCard = index === 1;
      const swipeBackButton = byId('swipeBackButton');
      swipeBackButton.disabled = !isMyCard;
      swipeBackButton.setAttribute('aria-disabled', String(!isMyCard));
    }

    function setupBottomSwipe() {
      const wrap = byId('bottomSwipeWrap');
      const track = byId('bottomSwipeTrack');
      let current = 0;
      let dragging = false;
      let startX = 0;
      let deltaX = 0;
      let pointerId = null;

      const setCard = (index, withAnimation = true) => {
        current = Math.max(0, Math.min(1, index));
        track.style.transition = withAnimation
          ? 'transform 0.45s cubic-bezier(0.2, 0.9, 0.2, 1)'
          : 'none';
        track.style.transform = `translateX(${-current * 50}%)`;
        updateSwipeUi(current);
      };

      const getThreshold = () => Math.max(54, wrap.clientWidth * 0.12);

      const onPointerMove = (evt) => {
        if (!dragging || evt.pointerId !== pointerId) return;
        deltaX = evt.clientX - startX;
        const base = -current * 50;
        const ratio = (deltaX / wrap.clientWidth) * 50;
        const next = Math.max(-50, Math.min(0, base + ratio));
        track.style.transform = `translateX(${next}%)`;
      };

      const onPointerUp = (evt) => {
        if (!dragging || evt.pointerId !== pointerId) return;
        dragging = false;
        track.classList.remove('dragging');
        track.releasePointerCapture(pointerId);
        const threshold = getThreshold();
        if (Math.abs(deltaX) > threshold) {
          if (deltaX < 0) setCard(current + 1);
          else setCard(current - 1);
        } else {
          setCard(current);
        }
        pointerId = null;
        deltaX = 0;
      };

      track.addEventListener('pointerdown', (evt) => {
        if (evt.pointerType === 'mouse' && evt.button !== 0) return;
        dragging = true;
        startX = evt.clientX;
        deltaX = 0;
        pointerId = evt.pointerId;
        track.classList.add('dragging');
        track.setPointerCapture(pointerId);
      });

      track.addEventListener('pointermove', onPointerMove);
      track.addEventListener('pointerup', onPointerUp);
      track.addEventListener('pointercancel', onPointerUp);

      byId('danmakuType').addEventListener('change', (evt) => {
        if (evt.target.value === 'my') setCard(1);
      });

      byId('saveMyDanmaku').addEventListener('click', () => {
        setCard(0);
      });

      byId('swipeBackButton').addEventListener('click', () => {
        setCard(0);
      });

      setCard(0, false);
    }

    function buildMyDanmaku(emoji) {
      const raw = (emoji || '').trim();
      const safeEmoji = raw || '🙂';
      return `🍣💛${safeEmoji}`.repeat(3);
    }

    function saveMyDanmakuCache(text) {
      const entry = { value: text, expiresAt: Date.now() + MY_DANMAKU_CACHE_MS };
      state.myDanmaku = text;
      try {
        sessionStorage.setItem(MY_DANMAKU_CACHE_KEY, JSON.stringify(entry));
      } catch (_) {}
    }

    function loadMyDanmakuCache() {
      try {
        const raw = sessionStorage.getItem(MY_DANMAKU_CACHE_KEY);
        if (!raw) return '';
        const entry = JSON.parse(raw);
        if (!entry?.value || Date.now() > Number(entry.expiresAt || 0)) {
          sessionStorage.removeItem(MY_DANMAKU_CACHE_KEY);
          return '';
        }
        return String(entry.value);
      } catch (_) {
        return '';
      }
    }

    function cacheKey() {
      return `${CACHE_PREFIX}:${state.q}|${state.kinds.join(',')}|${state.sortMode}`;
    }

    function loadCache() {
      try {
        const raw = localStorage.getItem(cacheKey());
        return raw ? JSON.parse(raw) : null;
      } catch (_) {
        return null;
      }
    }

    function saveCache(entry) {
      try {
        localStorage.setItem(cacheKey(), JSON.stringify(entry));
      } catch (_) {}
    }

    function fmtDate(value) {
      if (!value) return '-';
      const d = new Date(value);
      return Number.isNaN(d.getTime()) ? value : d.toLocaleDateString('ja-JP');
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function normalizeKind(kind) {
      return KIND_MAP[String(kind || '').toLowerCase()] || 'other';
    }

    function kindLabel(kind) {
      return KIND_LABELS[kind] || 'その他';
    }

    function dateOf(item) {
      const t = Date.parse(item?.publishedAt || '');
      return Number.isNaN(t) ? 0 : t;
    }

    function openSongLink(item) {
      const rawUrl = String(item?.url || '').trim();
      if (!rawUrl) return false;
      const safeUrl = encodeURI(rawUrl);
      window.open(safeUrl, '_blank', 'noopener,noreferrer');
      return true;
    }

    function stableSongId(item) {
      const videoId = String(item?.videoId || item?.videoid || item?.video_id || '').trim();
      const title = String(item?.title || '').trim();
      const artist = String(item?.artist || '').trim();
      return [videoId, title, artist].map((part) => encodeURIComponent(part)).join('|');
    }

    function sortItems(items) {
      const sorted = [...items];
      switch (state.sortMode) {
        case 'artist-asc':
          return sorted.sort((a, b) => String(a.artist || '').localeCompare(String(b.artist || ''), 'ja'));
        case 'artist-desc':
          return sorted.sort((a, b) => String(b.artist || '').localeCompare(String(a.artist || ''), 'ja'));
        case 'title-asc':
          return sorted.sort((a, b) => String(a.title || '').localeCompare(String(b.title || ''), 'ja'));
        case 'title-desc':
          return sorted.sort((a, b) => String(b.title || '').localeCompare(String(a.title || ''), 'ja'));
        case 'date-asc':
          return sorted.sort((a, b) => dateOf(a) - dateOf(b));
        case 'date-desc':
        default:
          return sorted.sort((a, b) => dateOf(b) - dateOf(a));
      }
    }

    function collapseExpanded() {
      state.expandedSongId = '';
      document.documentElement.classList.remove('snap-active');
      rows.querySelectorAll('.song-card.expanded').forEach((card) => {
        card.classList.remove('expanded');
        card.setAttribute('aria-expanded', 'false');
      });
    }

    function render(items) {
      selectedCount.textContent = String(items.length);

      if (!items.length) {
        rows.innerHTML = '<div class="muted">該当データがありません</div>';
        rows.dataset.selected = '{}';
        state.selectedSongId = '';
        collapseExpanded();
        return;
      }

      rows.innerHTML = items.map((item) => {
        const id = stableSongId(item);
        const safeUrl = item.url ? encodeURI(item.url) : '';
        const expanded = state.expandedSongId === id;
        return `
          <article class="song-card ${expanded ? 'expanded' : ''}" data-id="${id}" tabindex="0" role="button" aria-expanded="${expanded ? 'true' : 'false'}">
            <div class="song-summary">
              <div class="song-title">${escapeHtml(item.title || '-')}</div>
              <div class="song-artist">${escapeHtml(item.artist || '-')}</div>
            </div>
            <div class="song-details">
              <div class="song-meta">
                <div><span class="tag">${escapeHtml(kindLabel(normalizeKind(item.kind)))}</span></div>
                <div>最終歌唱日: ${escapeHtml(fmtDate(item.publishedAt))}</div>
              </div>
              ${item.url ? `<a class="icon-btn" href="${safeUrl}" target="_blank" rel="noopener noreferrer" title="${escapeHtml(item.linkLabel || '該当箇所へ移動')}">▶</a>` : '<span class="muted">-</span>'}
              <button class="icon-btn copy-song" type="button">楽曲情報コピー</button>
            </div>
          </article>
        `;
      }).join('');

      rows.querySelectorAll('.song-card').forEach((el, idx) => {
        const item = items[idx] || {};
        const id = el.dataset.id || '';

        const select = () => {
          state.selectedSongId = id;
          rows.dataset.selected = JSON.stringify(item);
        };

        const toggle = () => {
          select();
          if (state.expandedSongId === id) {
            collapseExpanded();
            return;
          }
          state.expandedSongId = id;
          document.documentElement.classList.add('snap-active');
          rows.querySelectorAll('.song-card.expanded').forEach((card) => {
            card.classList.remove('expanded');
            card.setAttribute('aria-expanded', 'false');
          });
          el.classList.add('expanded');
          el.setAttribute('aria-expanded', 'true');
        };

        el.addEventListener('click', (evt) => {
          if (evt.target.closest('.copy-song') || evt.target.closest('a')) return;
          select();
          if (!openSongLink(item)) {
            toggle();
          }
        });

        el.addEventListener('keydown', (evt) => {
          if (evt.key === 'Enter' || evt.key === ' ') {
            evt.preventDefault();
            select();
            if (!openSongLink(item)) {
              toggle();
            }
          }
        });

        const copyButton = el.querySelector('.copy-song');
        copyButton?.addEventListener('click', async (evt) => {
          evt.stopPropagation();
          select();
          const text = [
            `アーティスト: ${item.artist || '-'}`,
            `楽曲名: ${item.title || '-'}`,
            `投稿日付: ${fmtDate(item.publishedAt)}`,
          ].join('\n');
          try {
            await navigator.clipboard.writeText(text);
            setStatus(`楽曲情報コピー完了: ${item.title || '-'}`);
          } catch (_) {
            setStatus('楽曲情報コピーに失敗しました', true);
          }
        });
      });

      if (!rows.querySelector(`.song-card[data-id="${CSS.escape(state.selectedSongId)}"]`)) {
        const first = rows.querySelector('.song-card');
        if (first) {
          state.selectedSongId = first.dataset.id || '';
          rows.dataset.selected = JSON.stringify(items[0] || {});
        }
      }
    }

    function filterItems(items) {
      const q = state.q.toLowerCase();
      const kinds = new Set(state.kinds);
      return sortItems(
        items
          .filter((item) => kinds.has(normalizeKind(item.kind)))
          .filter((item) => {
            if (!q) return true;
            const target = [item.title, item.artist, item.memo].filter(Boolean).join(' ').toLowerCase();
            return target.includes(q);
          }),
      );
    }

    const API_FALLBACK_ENDPOINTS = [
      'https://script.google.com/macros/s/AKfycbyMD58NPs-RUi24wiP0AZSPziHEgNj0RPmC3_HM65hSMhQ6J4lF0cj51NtBDrFd3Kqa/exec?api=songs',
    ];

    function apiUrl(path, params) {
      const base = new URL(path.replace(/^\/+/, ''), window.location.href);
      if (params) base.search = params.toString();
      return base.toString();
    }

    function withQuery(url, params) {
      const base = new URL(url, window.location.href);
      params.forEach((value, key) => {
        if (!base.searchParams.has(key)) base.searchParams.set(key, value);
      });
      return base.toString();
    }

    async function load() {
      setStatus('読み込み中...');
      clearErrorLog();

      const params = new URLSearchParams({ q: state.q, kind: 'all', sort: 'latest' });
      const cached = loadCache();
      const requestCandidates = [
        apiUrl('api/songs', params),
        ...API_FALLBACK_ENDPOINTS.map((endpoint) => withQuery(endpoint, params)),
      ];

      let requestUrl = requestCandidates[0];

      if (cached?.payload?.items) {
        const cachedItems = filterItems(Array.isArray(cached.payload.items) ? cached.payload.items : []);
        render(cachedItems);
        setStatus(`キャッシュ表示 ${cachedItems.length} / 総数 ${cached.payload.total ?? 0}`);
      }

      try {
        let res;
        let lastError = null;

        for (const candidateUrl of requestCandidates) {
          requestUrl = candidateUrl;
          try {
            res = await fetch(candidateUrl, {
              headers: cached?.etag ? { 'If-None-Match': cached.etag } : {},
            });
          } catch (fetchErr) {
            lastError = fetchErr;
            continue;
          }

          if (res.ok || res.status === 304) break;

          if (res.status !== 404) {
            const bodyText = await res.text();
            const httpError = new Error(`HTTP ${res.status}`);
            httpError.name = 'HttpResponseError';
            httpError.details = {
              status: res.status,
              statusText: res.statusText,
              headers: headersToObject(res.headers),
              bodyPreview: clipText(bodyText),
            };
            throw httpError;
          }

          lastError = new Error('HTTP 404');
          lastError.name = 'HttpResponseError';
        }

        if (!res) throw lastError || new Error('Fetch failed');

        if (res.status === 304 && cached?.payload) {
          const cachedItems = filterItems(Array.isArray(cached.payload.items) ? cached.payload.items : []);
          render(cachedItems);
          setStatus(`更新なし（ETag） 表示 ${cachedItems.length} / 総数 ${cached.payload.total ?? 0}`);
          return;
        }

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        let payload;
        try {
          payload = await res.json();
        } catch (jsonErr) {
          const parseError = new Error('JSON parse failed');
          parseError.name = 'JsonParseError';
          parseError.details = {
            status: res.status,
            statusText: res.statusText,
            headers: headersToObject(res.headers),
          };
          parseError.cause = jsonErr;
          throw parseError;
        }
        const etag = res.headers.get('etag');
        const filteredItems = filterItems(Array.isArray(payload.items) ? payload.items : []);
        render(filteredItems);
        setStatus(`表示 ${filteredItems.length} / 総数 ${payload.total ?? 0}`);

        if (etag) saveCache({ etag, payload });
      } catch (err) {
        const detail = {
          timestamp: new Date().toISOString(),
          errorName: err?.name || 'Error',
          message: err?.message || 'Unknown error',
          stack: clipText(err?.stack || ''),
          request: {
            url: requestUrl,
            method: 'GET',
            params: Object.fromEntries(params.entries()),
            hasIfNoneMatch: Boolean(cached?.etag),
          },
          response: err?.details || null,
          cache: {
            hasCachedPayload: Boolean(cached?.payload),
            cachedEtag: cached?.etag || null,
          },
          client: {
            location: window.location.href,
            userAgent: navigator.userAgent,
            language: navigator.language,
          },
          cause: err?.cause ? {
            name: err.cause?.name || 'Error',
            message: err.cause?.message || String(err.cause),
            stack: clipText(err.cause?.stack || ''),
          } : null,
        };
        setErrorLog(detail);
        if (!cached?.payload) {
          rows.innerHTML = '<div class="error">データ取得に失敗しました。Worker / R2 の設定を確認してください。</div>';
        }
        setStatus(`エラー: ${err.message}`, true);
      }
    }

    async function copyDanmaku() {
      const selected = JSON.parse(rows.dataset.selected || '{}');
      const type = byId('danmakuType').value;
      if (type !== 'my' && !selected.title && !selected.artist) {
        setStatus('コピー対象がありません', true);
        return;
      }

      let text = selected.title || '';
      if (type === 'artist') text = selected.artist || '';
      if (type === 'full') text = `${selected.title || ''} - ${selected.artist || ''}`;
      if (type === 'my') text = state.myDanmaku || loadMyDanmakuCache();

      if (!text.trim()) {
        setStatus(
          type === 'my'
            ? 'マイ弾幕がありません。弾幕編集（マイ弾幕）から作成してください。'
            : 'コピー対象がありません',
          true,
        );
        return;
      }

      try {
        await navigator.clipboard.writeText(text.trim());
        setStatus(`弾幕コピー完了: ${text.trim()}`);
      } catch (_) {
        setStatus('コピーに失敗しました（権限を確認してください）', true);
      }
    }

    function toggleKind(kind) {
      const set = new Set(state.kinds);
      if (set.has(kind)) set.delete(kind);
      else set.add(kind);
      state.kinds = [...set];

      if (state.kinds.length === 0) {
        state.kinds = [...DEFAULT_KINDS];
        byId('kindCover').checked = true;
        byId('kindShort').checked = true;
        byId('kindLive').checked = true;
      }
      load();
    }

    function bind() {
      byId('q').addEventListener('input', (e) => {
        state.q = e.target.value.trim();
        load();
      });

      byId('kindCover').addEventListener('change', () => toggleKind('cover'));
      byId('kindShort').addEventListener('change', () => toggleKind('short'));
      byId('kindLive').addEventListener('change', () => toggleKind('live'));

      byId('sortMode').addEventListener('change', (e) => {
        state.sortMode = e.target.value;
        load();
      });

      byId('clear').addEventListener('click', () => {
        state.q = '';
        byId('q').value = '';
        load();
      });

      byId('copyDanmaku').addEventListener('click', copyDanmaku);
      byId('copyErrorLog').addEventListener('click', copyErrorLog);

      byId('saveMyDanmaku').addEventListener('click', () => {
        const text = buildMyDanmaku(byId('myEmoji').value);
        saveMyDanmakuCache(text);
        byId('danmakuType').value = 'my';
        setStatus('マイ弾幕を保存しました（15分キャッシュ）');
      });

      byId('collapseToggle').addEventListener('click', () => {
        const collapsed = byId('topForm').classList.toggle('collapsed');
        byId('collapseToggle').textContent = collapsed ? '展開' : '折り畳み';
      });

      byId('scrollTop').addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });

      window.addEventListener('scroll', () => {
        byId('scrollTop').classList.toggle('show', window.scrollY > 280);
      });

      window.addEventListener('wheel', (evt) => {
        if (!state.expandedSongId) return;
        if (Math.abs(evt.deltaY) < 140) return;
        collapseExpanded();
      }, { passive: true });
    }

    bind();
    setupBottomSwipe();
    state.myDanmaku = loadMyDanmakuCache();
    load();
  </script>
</body>
</html>
