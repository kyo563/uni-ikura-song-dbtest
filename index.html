<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="songs-r2-json-url" content="https://pub-e333d72512c24eb290119f7f2e0e4bdf.r2.dev/songs.json">
  <meta name="songs-gas-api-url" content="https://script.google.com/macros/s/AKfycbzU9lD1qRGocSkZvZJmh6FTw75XBnLMXgRIAyEDBuwqIG_whykcxbjjrhuk6K789ciS/exec?api=songs">
  <title>うにうたDB</title>
  <link rel="icon" href="assets/icons/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="assets/icons/site.webmanifest">
  <meta name="theme-color" content="#f4a645">
  <style>
    :root {
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --radius-sm: 8px;
      --radius-md: 12px;
      --control-height: 36px;
      --font-control: 16px;
      --surface: #e6ffff;
      --surface-2: #c6e9f7;
      --text: #0f172a;
      --muted: #334155;
      --line: #334155;
      --primary: #38bdf8;
      --accent: #22d3ee;
      --danger: #f87171;
      --focus: #2fd12f;
      --bg-scroll-darkness: 0;
      --bg-scroll-brightness: 0;
      --scroll-top-offset: 0px;
      --dummy-end-card-height: 72px;
      --dummy-top-card-height: 80px;
      --dummy-top-card-height-fixed: auto;
      --dummy-top-card-extra-expanded: 3px;
      --dummy-top-card-extra-collapsed: 7px;
      --layout-side-padding: var(--space-4);
      --pc-fluid-width-enabled: 1; /* 1: PCでA案(フル幅寄せ) / 0: 従来の1080px上限 */
      --pc-content-max-width: 1080px;
    }

    * { box-sizing: border-box; }
    html,
    body {
      width: 100%;
      height: 100dvh;
      max-width: 100%;
      overflow-x: hidden;
      overflow-y: hidden;
    }

    html {
      background: linear-gradient(180deg, #f9cda0 0%, #f4a645 100%);
    }

    body {
      position: relative;
      isolation: isolate;
      display: flex;
      margin: 0;
      min-height: 100dvh;
      padding: calc(var(--space-4) + env(safe-area-inset-top)) var(--space-4) calc(var(--space-4) + env(safe-area-inset-bottom));
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      background:
        linear-gradient(
          180deg,
          rgb(255 255 255 / calc(var(--bg-scroll-brightness) * 0.6)) 0%,
          rgb(255 255 255 / var(--bg-scroll-brightness)) 100%
        ),
        linear-gradient(
          180deg,
          rgb(0 0 0 / var(--bg-scroll-darkness)) 0%,
          rgb(0 0 0 / calc(var(--bg-scroll-darkness) * 0.8)) 100%
        ),
        linear-gradient(180deg, #f9cda0 0%, #f4a645 100%);
      color: var(--text);
      transition: background 0.25s ease;
      background-attachment: fixed, fixed, fixed;
      background-repeat: no-repeat, no-repeat, no-repeat;
      background-size: 100% 100vh, 100% 100vh, 100% 100vh;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-repeat: repeat;
      opacity: 0.32;
      will-change: background-position;
    }

    body::before {
      background-image:
        radial-gradient(circle at 20% 90%, rgb(255 255 255 / 45%) 0 3px, transparent 4px),
        radial-gradient(circle at 60% 95%, rgb(255 255 255 / 35%) 0 2px, transparent 3px),
        radial-gradient(circle at 85% 88%, rgb(255 255 255 / 40%) 0 2.5px, transparent 3.5px);
      background-size: 220px 320px;
      animation: bubble-rise 17s linear infinite;
    }

    body::after {
      background-image:
        radial-gradient(circle at 10% 96%, rgb(255 255 255 / 30%) 0 1.5px, transparent 2.5px),
        radial-gradient(circle at 42% 92%, rgb(255 255 255 / 38%) 0 2px, transparent 3px),
        radial-gradient(circle at 76% 94%, rgb(255 255 255 / 28%) 0 1.8px, transparent 2.8px);
      background-size: 180px 280px;
      opacity: 0.24;
      animation: bubble-rise 24s linear infinite reverse;
    }

    @keyframes bubble-rise {
      from {
        background-position: 0 106vh, 90px 110vh, 160px 114vh;
      }
      to {
        background-position: 0 30vh, 90px 34vh, 160px 38vh;
      }
    }

    .container {
      position: relative;
      z-index: 1;
      width: min(100%, 1080px);
      margin: 0 auto;
      min-height: 100%;
      flex: 1;
    }
    .card {
      background: #e6ffff;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: var(--space-3);
    }

    h1 { margin: 0 0 var(--space-1); font-size: 21px; }
    h2 { margin: 0 0 var(--space-2); font-size: 16px; }
    .muted { color: var(--muted); font-size: 13px; }
    .status-shell {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-left: 6px;
      padding: 3px 10px 3px 8px;
      border-radius: 999px;
      border: 1px solid color-mix(in srgb, var(--line) 85%, white 15%);
      background: color-mix(in srgb, var(--surface-2) 88%, black 12%);
      overflow: hidden;
      transition: border-color 0.25s ease, background-color 0.25s ease, opacity 0.25s ease;
      opacity: 0.7;
    }

    .status-shell::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 20%, rgb(255 255 255 / 12%) 50%, transparent 80%);
      transform: translateX(-130%);
      opacity: 0;
      pointer-events: none;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #64748b;
      flex: 0 0 auto;
      box-shadow: 0 0 0 2px rgb(15 23 42 / 45%);
      transition: background-color 0.25s ease;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
      transition: color 0.25s ease;
    }

    .status-shell[data-state="ok"] {
      border-color: color-mix(in srgb, var(--line) 88%, #10b981 12%);
      background: color-mix(in srgb, var(--surface-2) 94%, #10b981 6%);
      opacity: 0.62;
    }

    .status-shell[data-state="ok"] .status-dot {
      background: #34d399;
    }

    .status-shell[data-state="loading"] {
      opacity: 0.82;
    }

    .status-shell[data-state="loading"]::before {
      opacity: 1;
      animation: status-shimmer 3.2s ease-in-out infinite;
    }

    .status-shell[data-state="loading"] .status-dot {
      background: #38bdf8;
      animation: status-pulse-soft 2s ease-in-out infinite;
    }

    .status-shell[data-state="error"] {
      border-color: color-mix(in srgb, var(--danger) 55%, #7f1d1d 45%);
      background: color-mix(in srgb, var(--surface-2) 82%, #7f1d1d 18%);
      opacity: 1;
      animation: status-pulse-alert 1.2s ease-in-out infinite;
    }

    .status-shell[data-state="error"] .status-dot {
      background: var(--danger);
      box-shadow: 0 0 0 2px rgb(127 29 29 / 35%), 0 0 10px rgb(248 113 113 / 45%);
    }

    .status-shell[data-state="error"] .status {
      color: #fecaca;
    }

    @keyframes status-pulse-soft {
      0%, 100% { transform: scale(1); opacity: 0.75; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    @keyframes status-shimmer {
      0% { transform: translateX(-130%); }
      100% { transform: translateX(130%); }
    }

    @keyframes status-pulse-alert {
      0%, 100% { box-shadow: 0 0 0 0 rgb(248 113 113 / 0%); }
      50% { box-shadow: 0 0 0 3px rgb(248 113 113 / 15%); }
    }

    @media (prefers-reduced-motion: reduce) {
      .status-shell,
      .status-shell::before,
      .status-dot,
      body::before,
      body::after {
        animation: none !important;
        transition: none;
      }

      .bottom-swipe-track.hinting {
        animation: none !important;
      }
    }

    label { display: grid; gap: var(--space-1); font-size: 13px; color: var(--muted); }

    .card :is(input, select) {
      width: 100%;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--text);
      min-height: var(--control-height);
      padding: var(--space-2) var(--space-3);
      font-size: var(--font-control);
    }

    .card button {
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      color: var(--text);
      min-height: var(--control-height);
      padding: var(--space-2) var(--space-3);
      cursor: pointer;
      font-size: var(--font-control);
      font-weight: 600;
    }

    button.primary {
      border-color: #0369a1;
      background: linear-gradient(180deg, var(--primary), #0ea5e9);
      color: #001018;
      font-weight: 700;
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    select:focus-visible,
    a:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 1px;
    }

    .top-form {
      position: fixed;
      left: 0;
      transform: none;
      width: min(calc(100vw - (var(--layout-side-padding) * 2)), 1080px);
      top: calc(var(--space-4) + env(safe-area-inset-top));
      z-index: 70;
      padding-top: var(--space-2);
      padding-bottom: 0;
      overflow: visible;
      --top-expanded-height: 170px;
      --top-collapsed-height: 0px;
    }

    .top-swipe-wrap {
      position: relative;
      overflow: hidden;
      width: 100%;
      min-height: 0;
      height: var(--top-expanded-height);
      transition: height 0.25s ease;
    }

    .top-form.collapsed .top-swipe-wrap {
      height: var(--top-collapsed-height);
    }

    .top-form.collapsed {
      padding-top: var(--space-2);
      padding-bottom: var(--space-2);
      min-height: 0;
    }

    .top-swipe-track {
      display: flex;
      width: 200%;
      transform: translateX(0%);
      transition: transform 0.45s cubic-bezier(0.2, 0.9, 0.2, 1);
      touch-action: pan-y;
    }

    .top-swipe-track.dragging {
      transition: none;
      cursor: grabbing;
    }

    .top-panel {
      position: relative;
      width: 50%;
      min-width: 0;
    }

    .top-panel[aria-label="メモカード"] {
      height: 100%;
    }

    .memo-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      padding: var(--space-2);
      min-height: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    #memoInput {
      width: 100%;
      min-height: 0;
      height: 100%;
      flex: 1;
      resize: none;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: #e6ffff;
      color: var(--text);
      padding: var(--space-2) var(--space-3);
      font-size: var(--font-control);
      font-family: inherit;
      line-height: 1.5;
    }

    .top-summary {
      margin-bottom: 0;
    }

    .top-collapsible {
      margin-top: var(--space-2);
      max-height: 360px;
      opacity: 1;
      overflow: hidden;
      transition: max-height 0.25s ease, opacity 0.2s ease, margin-top 0.2s ease;
    }

    .summary-box {
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      min-height: var(--control-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: nowrap;
      gap: 4px 10px;
      padding: var(--space-2) var(--space-3);
      font-size: 12px;
      color: var(--text);
    }

    .top-summary {
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .summary-actions {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: var(--space-2);
      margin-left: auto;
    }

    .summary-inline {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }

    .summary-inline.count-inline {
      display: none;
    }

    .count-inline {
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .error-log-wrap {
      margin-top: var(--space-2);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      padding: var(--space-2);
      display: none;
      gap: var(--space-2);
    }

    .error-log-wrap.show {
      display: grid;
    }

    .error-log-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .error-log {
      margin: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: #0b1220;
      color: #dbeafe;
      padding: var(--space-2);
      max-height: 280px;
      overflow: auto;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .top-advanced {
      display: grid;
      gap: var(--space-2);
      grid-template-columns: 1.5fr auto;
      align-items: end;
    }

    .sort-row {
      display: grid;
      gap: var(--space-2);
      grid-template-columns: auto auto;
      align-items: end;
      justify-content: start;
    }

    .sort-row label {
      min-width: 0;
    }

    .sort-row select,
    .sort-row button {
      width: fit-content;
      min-width: 112px;
    }

    .sort-row select.sort-compact {
      min-height: calc(var(--control-height) - 4px);
      padding: calc(var(--space-2) - 2px) var(--space-2);
    }

    .sort-row select.sort-compact:focus-visible {
      outline: none;
      box-shadow:
        inset 0 0 0 2px var(--focus),
        0 0 0 1px color-mix(in srgb, var(--focus) 58%, transparent);
    }

    .top-fold-btn,
    .top-expand-btn {
      border: 0 !important;
      background: transparent !important;
      font-size: 11px !important;
      min-height: auto !important;
      min-width: 0;
      padding: 0;
      white-space: nowrap;
      color: var(--muted);
    }

    .top-expand-btn {
      display: none;
    }

    .top-form:not(.collapsed) .top-expand-btn {
      display: none;
    }

    .top-form.collapsed .top-fold-btn {
      display: none;
    }

    .top-form.collapsed .top-collapsible {
      max-height: 0;
      opacity: 0;
      margin-top: 0;
      pointer-events: none;
    }

    .top-form.collapsed .top-expand-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .checkbox-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
      padding-top: 2px;
      align-items: center;
    }

    .checkbox-row label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text);
    }

    .checkbox-row input {
      width: auto;
      min-height: auto;
      accent-color: #3dff3d;
    }

    .bottom-grid {
      display: grid;
      gap: var(--space-2);
      grid-template-columns: 1fr;
      align-items: end;
    }

    .bottom-static-controls {
      margin-top: var(--space-2);
    }

    .bottom-form {
      position: fixed;
      left: 0;
      transform: none;
      width: min(calc(100vw - (var(--layout-side-padding) * 2)), 1080px);
      bottom: calc(var(--space-4) + env(safe-area-inset-bottom));
      z-index: 60;
      box-shadow: 0 12px 22px rgb(15 23 42 / 24%);
    }

    .ratio-8-2 {
      display: grid;
      gap: var(--space-2);
      grid-template-columns: 8fr 2fr;
      align-items: end;
    }


    .search-inline {
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
    }

    #clear {
      min-width: 72px;
      width: auto;
      padding-left: var(--space-2);
      padding-right: var(--space-2);
      white-space: nowrap;
      justify-self: end;
    }

    .bottom-swipe-wrap {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: color-mix(in srgb, var(--surface-2) 96%, white 4%);
    }

    .bottom-swipe-track {
      display: flex;
      width: 200%;
      transform: translateX(0%);
      transition: transform 0.45s cubic-bezier(0.2, 0.9, 0.2, 1);
      touch-action: pan-y;
    }

    .bottom-swipe-track.hinting {
      animation: swipe-hint 2.2s ease-in-out infinite;
    }

    .bottom-swipe-track.dragging {
      transition: none;
      cursor: grabbing;
    }

    .bottom-panel {
      position: relative;
      width: 50%;
      padding: var(--space-1) var(--space-2);
      display: grid;
      gap: var(--space-1);
      min-width: 0;
    }

    .page-indicator {
      --indicator-dot-size: 6px;
      position: absolute;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      pointer-events: none;
      z-index: 1;
      opacity: 0.96;
    }

    .page-indicator.top-indicator {
      right: calc(var(--space-2) + 3px);
      bottom: 0;
      transform: translateY(calc(50% - var(--indicator-dot-size)));
    }

    .page-indicator.bottom-indicator {
      left: calc(var(--space-2) + 3px);
      top: 0;
      transform: translateY(calc(-50% + var(--indicator-dot-size)));
    }

    .page-indicator .dot {
      width: var(--indicator-dot-size);
      height: var(--indicator-dot-size);
      border-radius: 50%;
      background: #111;
      opacity: 0.92;
      transform: scale(0.92);
      transition: background-color 0.28s ease, opacity 0.28s ease, transform 0.28s ease;
    }

    .page-indicator .dot.active {
      background: #3dff3d;
      opacity: 1;
      transform: scale(1);
    }

    @keyframes swipe-hint {
      0%,
      68%,
      100% { transform: translateX(0%); }
      34% { transform: translateX(-12%); }
    }

    @media (max-width: 860px) {
      :root {
        --layout-side-padding: var(--space-2);
      }

      body { padding: var(--space-2); }
      .card :is(input, select) { font-size: 16px; }
      #memoInput { font-size: 16px; }
      .container {
        width: 100%;
        gap: var(--space-2);
        min-height: calc(100dvh - (var(--space-2) * 2));
        grid-template-rows: auto minmax(0, 1fr) auto;
      }
      .card,
      .top-form,
      .middle-form,
      .bottom-form { width: 100%; }
      .card { padding: var(--space-2); }
      .bottom-form {
        bottom: calc(var(--space-2) + env(safe-area-inset-bottom));
      }
      .top-summary { grid-template-columns: 1fr; }
      .top-advanced { grid-template-columns: 1fr; gap: var(--space-2); }
      .sort-row { grid-template-columns: auto auto; }
      .sort-row button { min-width: 96px; }
      .sort-row select { min-width: 98px; }
      .sort-row select.sort-compact { min-width: 102px; }
      .memo-actions { grid-template-columns: 1fr 1fr; }
      .ratio-8-2 { grid-template-columns: 1fr; }
      .bottom-static-controls .ratio-8-2 {
        grid-template-columns: minmax(0, 1fr) auto;
        gap: var(--space-1);
      }
      .bottom-static-controls #copyDanmaku {
        min-width: 64px;
        padding-left: var(--space-2);
        padding-right: var(--space-2);
        white-space: nowrap;
      }
      .search-inline { grid-template-columns: minmax(0, 1fr) auto; }
      .summary-box { font-size: 11px; }
      .middle-form {
        display: flex;
        min-height: 0;
      }
      .song-cards {
        flex: 1;
        height: 100%;
        max-height: none;
      }
    }

    @media (min-width: 861px) {
      .top-fold-btn,
      .top-expand-btn {
        display: none !important;
      }

      .top-form,
      .middle-form,
      .bottom-form {
        width: min(
          calc(100vw - (var(--layout-side-padding) * 2)),
          max(var(--pc-content-max-width), calc(100vw * var(--pc-fluid-width-enabled)))
        );
      }

      .top-swipe-wrap {
        height: var(--top-expanded-height);
      }
    }

    .song-cards {
      display: grid;
      gap: var(--space-1);
      overflow-y: auto;
      min-height: 0;
      height: 100%;
      padding-right: 0;
    }

    .middle-form {
      display: flex;
      min-height: 0;
      padding: 0;
      background: transparent;
      border: 0;
      position: fixed;
      left: 0;
      transform: none;
      width: min(calc(100vw - (var(--layout-side-padding) * 2)), 1080px);
      top: calc(var(--space-4) + env(safe-area-inset-top));
      bottom: calc(var(--space-4) + env(safe-area-inset-bottom));
      z-index: 10;
      overflow: hidden;
    }

    .song-card {
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: #e6ffff;
      padding: var(--space-2);
      width: 100%;
      transition: border-color 0.2s ease, opacity 0.25s ease, box-shadow 0.2s ease;
      scroll-snap-align: start;
    }

    .song-card.expanded {
      border-color: color-mix(in srgb, var(--line) 65%, var(--accent) 35%);
      box-shadow: 0 8px 18px rgb(2 132 199 / 22%);
    }

    .song-card-main {
      display: grid;
      gap: var(--space-2);
    }

    .song-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: var(--space-2);
      align-items: center;
    }

    .song-summary { display: grid; gap: 2px; font-size: 13px; min-width: 0; }
    .song-title { font-weight: 700; }
    .song-artist { color: var(--muted); font-size: 13px; }

    .song-details {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      align-items: start;
      margin-top: var(--space-2);
      padding-top: var(--space-2);
      border-top: 1px solid var(--line);
      gap: var(--space-2);
      font-size: 13px;
    }

    .song-meta { display: grid; gap: var(--space-1); min-width: 0; }

    .song-meta-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-2);
      min-width: 0;
    }

    .song-meta-latest {
      margin-left: auto;
      text-align: right;
      white-space: nowrap;
    }

    .song-date-link {
      color: #ff8c00;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    button.song-date-link {
      border: 0;
      background: transparent;
      padding: 0;
      font: inherit;
      cursor: pointer;
    }

    .icon-btn {
      min-width: 36px;
      min-height: 32px;
      padding: var(--space-1) var(--space-2);
    }

    .copy-text-btn {
      white-space: nowrap;
      min-width: 74px;
    }


    .tag {
      display: inline-block;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px var(--space-2);
      font-size: 12px;
      background: #1e90ff;
      color: #ffffff;
    }

    .tag-link {
      text-decoration: none;
      cursor: pointer;
    }

    .song-detail-link,
    .song-detail-link:visited {
      color: #ff8c00;
    }

    .song-detail-link:hover,
    .song-detail-link:focus-visible {
      color: #ffad33;
    }

    #copyErrorLog,
    #copyMemo,
    #pasteMemo,
    #copyDanmaku,
    .copy-text-btn {
      background: #1e90ff;
      color: #ffffff;
    }

    .memo-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-2);
      align-items: end;
    }

    #pasteMemo,
    #copyMemo {
      width: 100%;
    }

    .song-link-row {
      min-width: 0;
      text-align: left;
    }

    .song-link-inline {
      display: inline-flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: var(--space-2);
      min-width: 0;
      text-align: left;
    }

    .song-link-title {
      display: inline-block;
      max-width: min(100%, 52ch);
      min-width: 0;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
      text-align: left;
    }

    .song-preview-card {
      display: block;
      position: relative;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      overflow: hidden;
      width: min(100%, 420px);
      aspect-ratio: 16 / 9;
      background: #0f172a;
    }

    .song-preview-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .song-preview-label {
      position: absolute;
      left: var(--space-2);
      bottom: var(--space-2);
      margin: 0;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      background: rgb(15 23 42 / 70%);
      color: #e2e8f0;
      backdrop-filter: blur(2px);
    }

    .song-preview-wrap {
      display: none;
      margin-top: var(--space-1);
      width: 100%;
      justify-content: center;
    }

    .song-card.preview-visible .song-preview-wrap {
      display: flex;
    }

    .tag-link:hover { filter: brightness(1.1); }

    @media (max-width: 768px) {
      .song-card {
        cursor: pointer;
      }

      .song-link-title {
        max-width: 100%;
      }

      .my-danmaku-row {
        grid-template-columns: 6fr 4fr;
      }

      .song-card .song-details {
        display: none;
      }

      .song-card.expanded .song-details {
        display: grid;
      }
    }

    .my-danmaku-form {
      display: grid;
      gap: var(--space-2);
    }

    .my-danmaku-row {
      display: grid;
      gap: var(--space-2);
      grid-template-columns: minmax(0, 1fr) max-content;
      align-items: end;
    }

    #myEmoji {
      width: 100%;
      min-width: 0;
      padding-left: 8px;
      padding-right: 8px;
    }

    .roll-highlight {
      animation: roll-highlight 0.45s ease;
    }

    @keyframes roll-highlight {
      0% { transform: translateY(-6px); filter: brightness(1); }
      45% { transform: translateY(2px); filter: brightness(1.2); }
      100% { transform: translateY(0); filter: brightness(1); }
    }

    .dummy-end-card {
      border: 0;
      border-radius: var(--radius-sm);
      padding: var(--space-2);
      min-height: var(--dummy-end-card-height);
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      display: grid;
      place-items: center;
    }

    .dummy-top-card {
      border: 0;
      border-radius: var(--radius-sm);
      padding: var(--space-2);
      min-height: calc(var(--dummy-top-card-height) + 1em);
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      display: grid;
      place-items: center;
    }

    .toast {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, calc(-50% + 6px));
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 12px;
      background: color-mix(in srgb, var(--surface-2) 94%, black 6%);
      color: var(--text);
      font-size: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s ease, transform 0.12s ease;
      z-index: 30;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, -50%);
    }

    .scroll-bubbles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 40;
      overflow: hidden;
    }

    .scroll-bubble {
      position: absolute;
      bottom: -24px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgb(255 255 255 / 85%), rgb(255 255 255 / 20%));
      animation: pop-bubble 2.8s ease-out forwards;
      opacity: 0;
    }

    @keyframes pop-bubble {
      0% { transform: translateY(0) scale(0.7); opacity: 0.1; }
      16% { opacity: 0.65; }
      100% { transform: translateY(-70dvh) scale(1.18); opacity: 0; }
    }

  </style>
</head>
<body>
  <div id="scrollBubbles" class="scroll-bubbles" aria-hidden="true"></div>
  <main class="container" id="songsPage">
    <section class="card top-form" id="topForm">
      <div class="page-indicator top-indicator" id="topPageIndicator" aria-hidden="true"><span class="dot active"></span><span class="dot"></span></div>
      <div class="top-swipe-wrap" id="topSwipeWrap">
        <div class="top-swipe-track" id="topSwipeTrack">
          <section class="top-panel" aria-label="絞り込みカード">
            <div class="top-summary">
              <div class="summary-box">
                <span class="status-shell" id="statusShell" data-state="loading">
                  <span class="status-dot" aria-hidden="true"></span>
                  <span class="status" id="status"></span>
                </span>
                <div class="summary-actions">
                  <div class="summary-inline count-inline"><span id="selectedCount">0</span>/<span id="totalCount">0</span>曲</div>
                  <button id="collapseTopMenu" class="top-fold-btn" type="button" aria-label="絞り込みメニューを折りたたむ">折りたたみ</button>
                  <button id="expandTopMenu" class="top-expand-btn" type="button" aria-label="絞り込みメニューを展開">展開</button>
                </div>
              </div>
            </div>

            <div class="top-collapsible">
              <div id="errorLogWrap" class="error-log-wrap" aria-live="polite">
                <div class="error-log-head">
                  <strong>エラー情報</strong>
                  <button id="copyErrorLog" type="button">コピー</button>
                </div>
                <pre id="errorLog" class="error-log">エラー時に情報を表示します。</pre>
              </div>

              <div class="top-advanced">
                <div class="checkbox-row" aria-label="絞り込み">
                    <label><input type="checkbox" id="kindLive" checked>歌枠</label>
                    <label><input type="checkbox" id="kindCover" checked>歌ってみた</label>
                    <label><input type="checkbox" id="kindShort" checked>ショート</label>
                </div>
                <div class="sort-row" aria-label="表示切替">
                  <label aria-label="並び替え項目">
                    <select id="sortField" class="sort-compact" aria-label="並び替え項目">
                      <option value="artist">アーティスト名</option>
                      <option value="title">楽曲名</option>
                      <option value="date" selected>投稿日</option>
                    </select>
                  </label>
                  <label aria-label="並び順">
                    <select id="sortOrder" class="sort-compact" aria-label="並び順">
                      <option value="asc">昇順</option>
                      <option value="desc" selected>降順</option>
                    </select>
                  </label>
                </div>
              </div>
            </div>
          </section>

          <section class="top-panel" aria-label="メモカード">
            <div class="memo-panel">
              <textarea id="memoInput" aria-label="メモ帳" placeholder="メモを入力"></textarea>
              <div class="memo-actions">
                <button id="copyMemo" type="button">コピー</button>
                <button id="pasteMemo" type="button">ペースト</button>
              </div>
            </div>
          </section>
        </div>
      </div>
    </section>

    <section class="card middle-form">
      <div id="rows" class="song-cards"></div>
    </section>

    <section class="card bottom-form">
      <div class="page-indicator bottom-indicator" id="bottomPageIndicator" aria-hidden="true"><span class="dot active"></span><span class="dot"></span></div>
      <div class="bottom-swipe-wrap" id="bottomSwipeWrap">
        <div class="bottom-swipe-track" id="bottomSwipeTrack">
          <section class="bottom-panel" aria-label="検索フォームカード">
            <div class="ratio-8-2 search-inline">
              <label aria-label="検索">
                <input id="q" type="search" aria-label="検索" placeholder="曲名 / アーティスト">
              </label>
              <button id="clear" type="button">クリア</button>
            </div>
          </section>

          <section class="bottom-panel my-danmaku-form" aria-label="マイ弾幕カード">
            <div class="my-danmaku-row">
              <input id="myEmoji" type="text" placeholder="🎨" maxlength="6" aria-label="絵文字入力">
              <button class="primary" id="saveMyDanmaku" type="button">弾幕を作成する</button>
            </div>
          </section>
        </div>
      </div>

      <div class="bottom-grid bottom-static-controls">
        <div class="ratio-8-2">
          <label aria-label="弾幕選択">
            <select id="danmakuType" aria-label="弾幕選択">
              <option value="custom:🧡🎶🍣🥂🧡🎶🍣🥂🧡🎶🍣🥂">🧡🎶🍣🥂…(🥂)</option>
              <option value="custom:🍣🎶🧡✨🍣🎶🧡✨🍣🎶🧡✨">🍣🎶🧡✨…(🍣)</option>
              <option value="custom:🍶🧡🎺🍶🧡🎺🍶🧡🎺🍶🧡🎺">🍶🧡🎺🍶…(🍶)</option>
              <option value="custom:🎧💫♬🧡🎧💫♬🧡🎧💫♬🧡">🎧💫♬🧡…(🎧)</option>
              <option value="custom:🧡🎹🎶🍣🧡🎹🎶🍣🧡🎹🎶🍣">🧡🎹🎶🍣…(🎹)</option>
              <option value="custom:🎵☀🧡～🎵☀🧡～🎵☀🧡～">🎵☀🧡～…(🎵)</option>
              <option value="custom:世界一🌏🌟⋆꙳イケボ✨世界一🌏🌟⋆꙳イケボ✨世界一🌏🌟⋆꙳イケボ✨">世界一イケボ…(🌏)</option>
              <option value="custom:✩࿐⋆*🍼👶 ﾟ·꒰ঌ ﾊﾞｯﾌﾞｰ ໒꒱· ﾟ👶🍼✩࿐⋆*">✩࿐⋆*🍼👶…(🍼)</option>
              <option value="my">カスタム弾幕</option>
            </select>
          </label>
          <button class="primary" id="copyDanmaku" type="button">コピー</button>
        </div>
      </div>

    </section>
  </main>

  <div id="toast" class="toast" aria-live="polite" role="status"></div>

  <script type="module">
    import { bind, setupTopSwipe, setupBottomSwipe, initializeApp } from './src/app.js';

    bind();
    setupTopSwipe();
    setupBottomSwipe();
    initializeApp();
  </script>
</body>
</html>
