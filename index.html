<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="songs-api-base" content="https://uni-ikura-song-dbtest.kyomtea.workers.dev/">
  <title>йӣІдё№гӮҗгҒҸгӮү Songs DB TEST</title>
  <style>
    :root {
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --radius-sm: 8px;
      --radius-md: 12px;
      --control-height: 36px;
      --font-control: 13px;
      --surface: #111827;
      --surface-2: #1f2937;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --line: #334155;
      --primary: #38bdf8;
      --accent: #22d3ee;
      --danger: #f87171;
      --focus: #f59e0b;
    }

    * { box-sizing: border-box; }
    html,
    body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      padding: var(--space-4);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      background: #ffffff;
      color: var(--text);
    }

    .container { width: min(100%, 1080px); margin: 0 auto; display: grid; gap: var(--space-3); }
    .card {
      background: color-mix(in srgb, var(--surface) 90%, black 10%);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: var(--space-3);
    }

    h1 { margin: 0 0 var(--space-1); font-size: 21px; }
    h2 { margin: 0 0 var(--space-2); font-size: 16px; }
    .muted { color: var(--muted); font-size: 13px; }
    .status-shell {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-left: 6px;
      padding: 3px 10px 3px 8px;
      border-radius: 999px;
      border: 1px solid color-mix(in srgb, var(--line) 85%, white 15%);
      background: color-mix(in srgb, var(--surface-2) 88%, black 12%);
      overflow: hidden;
      transition: border-color 0.25s ease, background-color 0.25s ease, opacity 0.25s ease;
      opacity: 0.7;
    }

    .status-shell::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 20%, rgb(255 255 255 / 12%) 50%, transparent 80%);
      transform: translateX(-130%);
      opacity: 0;
      pointer-events: none;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #64748b;
      flex: 0 0 auto;
      box-shadow: 0 0 0 2px rgb(15 23 42 / 45%);
      transition: background-color 0.25s ease;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
      transition: color 0.25s ease;
    }

    .status-shell[data-state="ok"] {
      border-color: color-mix(in srgb, var(--line) 88%, #10b981 12%);
      background: color-mix(in srgb, var(--surface-2) 94%, #10b981 6%);
      opacity: 0.62;
    }

    .status-shell[data-state="ok"] .status-dot {
      background: #34d399;
    }

    .status-shell[data-state="loading"] {
      opacity: 0.82;
    }

    .status-shell[data-state="loading"]::before {
      opacity: 1;
      animation: status-shimmer 3.2s ease-in-out infinite;
    }

    .status-shell[data-state="loading"] .status-dot {
      background: #38bdf8;
      animation: status-pulse-soft 2s ease-in-out infinite;
    }

    .status-shell[data-state="error"] {
      border-color: color-mix(in srgb, var(--danger) 55%, #7f1d1d 45%);
      background: color-mix(in srgb, var(--surface-2) 82%, #7f1d1d 18%);
      opacity: 1;
      animation: status-pulse-alert 1.2s ease-in-out infinite;
    }

    .status-shell[data-state="error"] .status-dot {
      background: var(--danger);
      box-shadow: 0 0 0 2px rgb(127 29 29 / 35%), 0 0 10px rgb(248 113 113 / 45%);
    }

    .status-shell[data-state="error"] .status {
      color: #fecaca;
    }

    @keyframes status-pulse-soft {
      0%, 100% { transform: scale(1); opacity: 0.75; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    @keyframes status-shimmer {
      0% { transform: translateX(-130%); }
      100% { transform: translateX(130%); }
    }

    @keyframes status-pulse-alert {
      0%, 100% { box-shadow: 0 0 0 0 rgb(248 113 113 / 0%); }
      50% { box-shadow: 0 0 0 3px rgb(248 113 113 / 15%); }
    }

    @media (prefers-reduced-motion: reduce) {
      .status-shell,
      .status-shell::before,
      .status-dot {
        animation: none !important;
        transition: none;
      }
    }

    label { display: grid; gap: var(--space-1); font-size: 13px; color: var(--muted); }

    .card :is(input, select) {
      width: 100%;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--text);
      min-height: var(--control-height);
      padding: var(--space-2) var(--space-3);
      font-size: var(--font-control);
    }

    .card button {
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      color: var(--text);
      min-height: var(--control-height);
      padding: var(--space-2) var(--space-3);
      cursor: pointer;
      font-size: var(--font-control);
      font-weight: 600;
    }

    button.primary {
      border-color: #0369a1;
      background: linear-gradient(180deg, var(--primary), #0ea5e9);
      color: #001018;
      font-weight: 700;
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    a:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }

    .top-form {
      position: relative;
      padding-bottom: 46px;
      overflow: hidden;
      transition: max-height 0.2s ease;
      max-height: 900px;
    }

    .top-summary {
      margin-bottom: var(--space-2);
    }

    .summary-box {
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      min-height: var(--control-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: nowrap;
      gap: 4px 10px;
      padding: var(--space-2) var(--space-3);
      font-size: 12px;
      color: var(--text);
    }

    .summary-inline {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }

    .count-inline {
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .error-log-wrap {
      margin-top: var(--space-2);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      padding: var(--space-2);
      display: none;
      gap: var(--space-2);
    }

    .error-log-wrap.show {
      display: grid;
    }

    .error-log-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .error-log {
      margin: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: #0b1220;
      color: #dbeafe;
      padding: var(--space-2);
      max-height: 280px;
      overflow: auto;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .top-advanced {
      display: grid;
      gap: var(--space-2);
      grid-template-columns: 1.5fr auto;
      align-items: end;
    }

    .sort-row {
      display: grid;
      gap: var(--space-2);
      grid-template-columns: auto auto;
      align-items: end;
      justify-content: start;
    }

    .sort-row label {
      min-width: 0;
    }

    .sort-row select,
    .sort-row button {
      width: fit-content;
      min-width: 112px;
    }

    .top-form.collapsed {
      max-height: 182px;
    }

    .top-form.collapsed .top-advanced { display: none; }

    .toggle-wrap {
      position: absolute;
      right: 0;
      bottom: 0;
      width: auto;
      display: flex;
      justify-content: flex-end;
    }

    .checkbox-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
      padding-top: 2px;
    }

    .checkbox-row label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text);
    }

    .checkbox-row input { width: auto; min-height: auto; }

    .bottom-grid {
      display: grid;
      gap: var(--space-2);
      grid-template-columns: 1fr;
      align-items: end;
    }

    .bottom-static-controls {
      margin-top: var(--space-2);
    }

    .ratio-8-2 {
      display: grid;
      gap: var(--space-2);
      grid-template-columns: 8fr 2fr;
      align-items: end;
    }


    .search-inline {
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
    }

    #clear {
      min-width: 72px;
      width: auto;
      padding-left: var(--space-2);
      padding-right: var(--space-2);
      white-space: nowrap;
      justify-self: end;
    }

    .bottom-swipe-wrap {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: color-mix(in srgb, var(--surface-2) 90%, black 10%);
    }

    .bottom-swipe-track {
      display: flex;
      width: 200%;
      transform: translateX(0%);
      transition: transform 0.45s cubic-bezier(0.2, 0.9, 0.2, 1);
      touch-action: pan-y;
    }

    .bottom-swipe-track.dragging {
      transition: none;
      cursor: grabbing;
    }

    .bottom-panel {
      width: 50%;
      padding: var(--space-1) var(--space-2);
      display: grid;
      gap: var(--space-1);
      min-width: 0;
    }

    @media (max-width: 860px) {
      body { padding: var(--space-2); }
      .card :is(input, select) { font-size: 16px; }
      .container { width: 100%; gap: var(--space-2); }
      .card,
      .top-form,
      .middle-form,
      .bottom-form { width: 100%; }
      .card { padding: var(--space-2); }
      .top-summary { grid-template-columns: 1fr; }
      .top-advanced { grid-template-columns: 1fr; gap: var(--space-2); }
      .sort-row { grid-template-columns: auto auto; }
      .sort-row select,
      .sort-row button { min-width: 96px; }
      .ratio-8-2 { grid-template-columns: 1fr; }
      .bottom-static-controls .ratio-8-2 {
        grid-template-columns: minmax(0, 1fr) auto;
        gap: var(--space-1);
      }
      .bottom-static-controls #copyDanmaku {
        min-width: 64px;
        padding-left: var(--space-2);
        padding-right: var(--space-2);
        white-space: nowrap;
      }
      .search-inline { grid-template-columns: minmax(0, 1fr) auto; }
      .summary-box { font-size: 11px; }
      .song-cards { max-height: 34vh; }
      .top-form.collapsed { max-height: 170px; }
    }

    @media (max-width: 640px) {
      .song-card-main {
        grid-template-columns: minmax(0, 1fr) 92px;
      }
    }

    .song-cards {
      display: grid;
      gap: var(--space-1);
      max-height: 54vh;
      overflow-y: auto;
      padding-right: 0;
    }

    .middle-form {
      padding: 0;
      background: transparent;
      border: 0;
    }

    .song-card {
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: color-mix(in srgb, var(--surface-2) 88%, black 12%);
      padding: var(--space-2);
      width: 100%;
      transition: margin 0.2s ease, border-color 0.2s ease, opacity 0.25s ease;
      cursor: pointer;
      scroll-snap-align: start;
    }

    .song-card-main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 108px;
      align-items: stretch;
      gap: var(--space-2);
    }

    .song-expand-hitarea {
      border: 0;
      border-radius: var(--radius-sm);
      background: transparent;
      color: transparent;
      font-size: 0;
      font-weight: 400;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      width: 100%;
      padding: 0;
      white-space: nowrap;
    }

    .song-card.expanded {
      margin: var(--space-1) 0;
      border-color: var(--accent);
    }

    .song-card.collapsing {
      border-color: color-mix(in srgb, var(--line) 75%, var(--accent) 25%);
    }

    .song-summary { display: grid; gap: 2px; font-size: 13px; min-width: 0; }
    .song-title { font-weight: 700; }
    .song-artist { color: var(--muted); font-size: 13px; }

    .song-details {
      display: none;
      margin-top: var(--space-2);
      padding-top: var(--space-2);
      border-top: 1px solid var(--line);
      gap: var(--space-2);
      font-size: 13px;
      transform-origin: top;
    }

    .song-card.expanded .song-details {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      align-items: center;
      animation: details-open 0.2s ease-out;
    }

    .song-card.collapsing .song-details {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      align-items: center;
      animation: details-close 0.36s cubic-bezier(0.2, 0.8, 0.25, 1) forwards;
    }

    @keyframes details-open {
      from { opacity: 0; transform: translateY(-4px) scaleY(0.96); }
      to { opacity: 1; transform: translateY(0) scaleY(1); }
    }

    @keyframes details-close {
      from { opacity: 1; transform: translateY(0) scaleY(1); }
      to { opacity: 0; transform: translateY(-2px) scaleY(0.92); }
    }

    .song-meta { display: grid; gap: var(--space-1); min-width: 0; }

    .song-date-link {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .icon-btn {
      min-width: 36px;
      min-height: 32px;
      padding: var(--space-1) var(--space-2);
    }

    .copy-text-btn {
      white-space: nowrap;
      min-width: 74px;
    }

    html.snap-active { scroll-snap-type: y proximity; }

    .tag {
      display: inline-block;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px var(--space-2);
      font-size: 12px;
      background: #0b2232;
      color: var(--accent);
    }

    .tag-link {
      text-decoration: none;
      cursor: pointer;
    }

    .tag-link:hover { filter: brightness(1.1); }

    #scrollTop {
      position: fixed;
      right: var(--space-4);
      bottom: var(--space-4);
      z-index: 20;
      display: none;
    }

    #scrollTop.show { display: inline-flex; }

    .my-danmaku-form {
      display: grid;
      gap: var(--space-2);
    }

    .my-danmaku-row {
      display: grid;
      gap: var(--space-2);
      grid-template-columns: 6ch auto;
      align-items: end;
    }

    #myEmoji {
      width: 100%;
      min-width: 6ch;
      padding-left: 8px;
      padding-right: 8px;
    }

    .roll-highlight {
      animation: roll-highlight 0.45s ease;
    }

    @keyframes roll-highlight {
      0% { transform: translateY(-6px); filter: brightness(1); }
      45% { transform: translateY(2px); filter: brightness(1.2); }
      100% { transform: translateY(0); filter: brightness(1); }
    }

    .dummy-end-card {
      border: 1px dashed var(--line);
      border-radius: var(--radius-sm);
      padding: var(--space-2);
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

  </style>
</head>
<body>
  <main class="container" id="songsPage">
    <section class="card top-form" id="topForm">
      <div class="top-summary">
        <div class="summary-box">
          <span class="status-shell" id="statusShell" data-state="loading">
            <span class="status-dot" aria-hidden="true"></span>
            <span class="status" id="status">иө·еӢ•</span>
          </span>
          <div class="summary-inline count-inline"><span id="selectedCount">0</span>/<span id="totalCount">0</span>жӣІ</div>
        </div>
      </div>

      <div id="errorLogWrap" class="error-log-wrap" aria-live="polite">
        <div class="error-log-head">
          <strong>гӮЁгғ©гғјжғ…е ұ</strong>
          <button id="copyErrorLog" type="button">гӮігғ”гғј</button>
        </div>
        <pre id="errorLog" class="error-log">гӮЁгғ©гғјжҷӮгҒ«жғ…е ұгӮ’иЎЁзӨәгҒ—гҒҫгҒҷгҖӮ</pre>
      </div>

      <div class="top-advanced">
        <div class="checkbox-row" aria-label="зөһгӮҠиҫјгҒҝ">
            <label><input type="checkbox" id="kindLive" checked>жӯҢжһ </label>
            <label><input type="checkbox" id="kindCover" checked>жӯҢгҒЈгҒҰгҒҝгҒҹ</label>
            <label><input type="checkbox" id="kindShort" checked>гӮ·гғ§гғјгғҲ</label>
        </div>
        <div class="sort-row" aria-label="иЎЁзӨәеҲҮжӣҝ">
          <label aria-label="дёҰгҒіжӣҝгҒҲй …зӣ®">
            <select id="sortField" aria-label="дёҰгҒіжӣҝгҒҲй …зӣ®">
              <option value="artist">гӮўгғјгғҶгӮЈгӮ№гғҲеҗҚ</option>
              <option value="title">жҘҪжӣІеҗҚ</option>
              <option value="date" selected>жҠ•зЁҝж—Ҙ</option>
            </select>
          </label>
          <label aria-label="дёҰгҒій Ҷ">
            <select id="sortOrder" aria-label="дёҰгҒій Ҷ">
              <option value="asc">жҳҮй Ҷ</option>
              <option value="desc" selected>йҷҚй Ҷ</option>
            </select>
          </label>
        </div>
      </div>

      <div class="toggle-wrap">
        <button id="collapseToggle" type="button">жҠҳгӮҠз•ігҒҝ</button>
      </div>
    </section>

    <section class="card middle-form">
      <div id="rows" class="song-cards"></div>
    </section>

    <section class="card bottom-form">
      <div class="bottom-swipe-wrap" id="bottomSwipeWrap">
        <div class="bottom-swipe-track" id="bottomSwipeTrack">
          <section class="bottom-panel" aria-label="жӨңзҙўгғ•гӮ©гғјгғ гӮ«гғјгғү">
            <div class="ratio-8-2 search-inline">
              <label aria-label="жӨңзҙў">
                <input id="q" type="search" aria-label="жӨңзҙў" placeholder="жӣІеҗҚ / гӮўгғјгғҶгӮЈгӮ№гғҲ">
              </label>
              <button id="clear" type="button">гӮҜгғӘгӮў</button>
            </div>
          </section>

          <section class="bottom-panel my-danmaku-form" aria-label="гғһгӮӨејҫе№•гӮ«гғјгғү">
            <div class="my-danmaku-row">
              <input id="myEmoji" type="text" placeholder="рҹҺү" maxlength="6" aria-label="зөөж–Үеӯ—е…ҘеҠӣ">
              <button class="primary" id="saveMyDanmaku" type="button">ејҫе№•гӮ’дҪңжҲҗгҒҷгӮӢ</button>
            </div>
          </section>
        </div>
      </div>

      <div class="bottom-grid bottom-static-controls">
        <div class="ratio-8-2">
          <label aria-label="ејҫе№•йҒёжҠһ">
            <select id="danmakuType" aria-label="ејҫе№•йҒёжҠһ">
              <option value="custom:рҹ§ЎрҹҺ¶рҹҚЈрҹҘӮрҹ§ЎрҹҺ¶рҹҚЈрҹҘӮрҹ§ЎрҹҺ¶рҹҚЈрҹҘӮ">рҹ§ЎрҹҺ¶рҹҚЈрҹҘӮвҖҰ(рҹҘӮ)</option>
              <option value="custom:рҹҚЈрҹҺ¶рҹ§ЎвңЁрҹҚЈрҹҺ¶рҹ§ЎвңЁрҹҚЈрҹҺ¶рҹ§ЎвңЁ">рҹҚЈрҹҺ¶рҹ§ЎвңЁвҖҰ(рҹҚЈ)</option>
              <option value="custom:рҹҚ¶рҹ§ЎрҹҺәрҹҚ¶рҹ§ЎрҹҺәрҹҚ¶рҹ§ЎрҹҺәрҹҚ¶рҹ§ЎрҹҺә">рҹҚ¶рҹ§ЎрҹҺәрҹҚ¶вҖҰ(рҹҚ¶)</option>
              <option value="custom:рҹҺ§рҹ’«вҷ¬рҹ§ЎрҹҺ§рҹ’«вҷ¬рҹ§ЎрҹҺ§рҹ’«вҷ¬рҹ§Ў">рҹҺ§рҹ’«вҷ¬рҹ§ЎвҖҰ(рҹҺ§)</option>
              <option value="custom:рҹ§ЎрҹҺ№рҹҺ¶рҹҚЈрҹ§ЎрҹҺ№рҹҺ¶рҹҚЈрҹ§ЎрҹҺ№рҹҺ¶рҹҚЈ">рҹ§ЎрҹҺ№рҹҺ¶рҹҚЈвҖҰ(рҹҺ№)</option>
              <option value="custom:рҹҺөвҳҖрҹ§ЎпҪһрҹҺөвҳҖрҹ§ЎпҪһрҹҺөвҳҖрҹ§ЎпҪһ">рҹҺөвҳҖрҹ§ЎпҪһвҖҰ(рҹҺө)</option>
              <option value="custom:дё–з•ҢдёҖрҹҢҸрҹҢҹвӢҶкҷігӮӨгӮұгғңвңЁдё–з•ҢдёҖрҹҢҸрҹҢҹвӢҶкҷігӮӨгӮұгғңвңЁдё–з•ҢдёҖрҹҢҸрҹҢҹвӢҶкҷігӮӨгӮұгғңвңЁ">дё–з•ҢдёҖгӮӨгӮұгғңвҖҰ(рҹҢҸ)</option>
              <option value="custom:вң©аҝҗвӢҶ*рҹҚјрҹ‘¶ пҫҹВ·к’°аҰҢ пҫҠпҫһпҪҜпҫҢпҫһпҪ° а»’к’ұВ· пҫҹрҹ‘¶рҹҚјвң©аҝҗвӢҶ*">вң©аҝҗвӢҶ*рҹҚјрҹ‘¶вҖҰ(рҹҚј)</option>
              <option value="my">гӮ«гӮ№гӮҝгғ ејҫе№•</option>
            </select>
          </label>
          <button class="primary" id="copyDanmaku" type="button">гӮігғ”гғј</button>
        </div>
      </div>

    </section>
  </main>

  <button id="scrollTop" class="primary" type="button">вҶ‘ дёҠгҒё</button>

  <script>
    const DEFAULT_KINDS = ['cover', 'short', 'live'];
    const KIND_MAP = {
      cover: 'cover',
      short: 'short',
      live: 'live',
      stream: 'live',
      'жӯҢгҒЈгҒҰгҒҝгҒҹ': 'cover',
      'жӯҢгҒҝгҒҹ': 'cover',
      'гӮ·гғ§гғјгғҲ': 'short',
      'жӯҢжһ ': 'live',
      'й…ҚдҝЎ': 'live',
    };
    const KIND_LABELS = { cover: 'жӯҢгҒЈгҒҰгҒҝгҒҹ', short: 'гӮ·гғ§гғјгғҲ', live: 'жӯҢжһ ', other: 'гҒқгҒ®д»–' };
    const CACHE_PREFIX = 'songs-cache-v3';
    const MY_DANMAKU_CACHE_KEY = 'my-danmaku-cache-v1';
    const MY_DANMAKU_CACHE_MS = 15 * 60 * 1000;

    const state = {
      q: '',
      kinds: [...DEFAULT_KINDS],
      sortMode: 'date-desc',
      sortField: 'date',
      sortOrder: 'desc',
      selectedSongId: '',
      expandedSongId: '',
      myDanmaku: '',
    };

    const byId = (id) => document.getElementById(id);
    const status = byId('status');
    const rows = byId('rows');
    const selectedCount = byId('selectedCount');
    const totalCount = byId('totalCount');
    const errorLogWrap = byId('errorLogWrap');
    const errorLog = byId('errorLog');
    const MAX_ERROR_BODY_CHARS = 4000;
    const ENABLE_ERROR_LOG_UI = true;
    let latestErrorLogText = '';
    let lastRowsScrollTop = 0;

    const statusShell = byId('statusShell');

    function setStatus(text, isError = false) {
      status.textContent = text;
      if (isError) {
        statusShell.dataset.state = 'error';
        return;
      }
      statusShell.dataset.state = text.includes('иӘӯиҫј') ? 'loading' : 'ok';
    }

    function clipText(value, max = MAX_ERROR_BODY_CHARS) {
      const text = String(value ?? '');
      if (text.length <= max) return text;
      return `${text.slice(0, max)}\n...<truncated ${text.length - max} chars>`;
    }

    function headersToObject(headers) {
      const picked = ['content-type', 'cache-control', 'etag', 'cf-ray', 'server', 'date'];
      const obj = {};
      for (const key of picked) {
        const value = headers.get(key);
        if (value) obj[key] = value;
      }
      return obj;
    }

    function setErrorLog(logObject) {
      latestErrorLogText = JSON.stringify(logObject, null, 2);
      if (ENABLE_ERROR_LOG_UI) {
        errorLog.textContent = latestErrorLogText;
        errorLogWrap.classList.add('show');
      }
      console.error('songs-db-detailed-error', logObject);
    }

    function clearErrorLog() {
      latestErrorLogText = '';
      if (ENABLE_ERROR_LOG_UI) {
        errorLog.textContent = 'гӮЁгғ©гғјжҷӮгҒ«жғ…е ұгӮ’иЎЁзӨәгҒ—гҒҫгҒҷгҖӮ';
      }
      errorLogWrap.classList.remove('show');
    }

    async function copyErrorLog() {
      if (!latestErrorLogText) {
        setStatus('гғӯгӮ°гҒӘгҒ—', true);
        return;
      }
      try {
        await navigator.clipboard.writeText(latestErrorLogText);
        setStatus('гғӯгӮ°гӮігғ”гғј');
      } catch (_) {
        setStatus('гғӯгӮ°еӨұж•—', true);
      }
    }

    let setSwipeCard = () => {};

    function setupBottomSwipe() {
      const wrap = byId('bottomSwipeWrap');
      const track = byId('bottomSwipeTrack');
      let current = 0;
      let dragging = false;
      let startX = 0;
      let deltaX = 0;
      let pointerId = null;

      const setCard = (index, withAnimation = true) => {
        current = Math.max(0, Math.min(1, index));
        track.style.transition = withAnimation
          ? 'transform 0.45s cubic-bezier(0.2, 0.9, 0.2, 1)'
          : 'none';
        track.style.transform = `translateX(${-current * 50}%)`;
      };

      const getThreshold = () => Math.max(54, wrap.clientWidth * 0.12);

      const onPointerMove = (evt) => {
        if (!dragging || evt.pointerId !== pointerId) return;
        deltaX = evt.clientX - startX;
        const base = -current * 50;
        const ratio = (deltaX / wrap.clientWidth) * 50;
        const next = Math.max(-50, Math.min(0, base + ratio));
        track.style.transform = `translateX(${next}%)`;
      };

      const onPointerUp = (evt) => {
        if (!dragging || evt.pointerId !== pointerId) return;
        dragging = false;
        track.classList.remove('dragging');
        track.releasePointerCapture(pointerId);
        const threshold = getThreshold();
        if (Math.abs(deltaX) > threshold) {
          if (deltaX < 0) setCard(current + 1);
          else setCard(current - 1);
        } else {
          setCard(current);
        }
        pointerId = null;
        deltaX = 0;
      };

      track.addEventListener('pointerdown', (evt) => {
        if (evt.pointerType === 'mouse' && evt.button !== 0) return;
        dragging = true;
        startX = evt.clientX;
        deltaX = 0;
        pointerId = evt.pointerId;
        track.classList.add('dragging');
        track.setPointerCapture(pointerId);
      });

      track.addEventListener('pointermove', onPointerMove);
      track.addEventListener('pointerup', onPointerUp);
      track.addEventListener('pointercancel', onPointerUp);

      byId('danmakuType').addEventListener('change', (evt) => {
        if (evt.target.value === 'my') setCard(1);
      });

      byId('saveMyDanmaku').addEventListener('click', () => {
        setCard(0);
      });

      setSwipeCard = setCard;

      setCard(0, false);
    }

    function buildMyDanmaku(emoji) {
      const raw = (emoji || '').trim();
      const safeEmoji = raw || 'рҹҷӮ';
      const emojiLength = Array.from(safeEmoji).length;
      const repeat = emojiLength >= 3 ? 2 : 3;
      return `рҹҚЈрҹ§Ў${safeEmoji}`.repeat(repeat);
    }

    function saveMyDanmakuCache(text) {
      const entry = { value: text, expiresAt: Date.now() + MY_DANMAKU_CACHE_MS };
      state.myDanmaku = text;
      try {
        sessionStorage.setItem(MY_DANMAKU_CACHE_KEY, JSON.stringify(entry));
      } catch (_) {}
    }

    function loadMyDanmakuCache() {
      try {
        const raw = sessionStorage.getItem(MY_DANMAKU_CACHE_KEY);
        if (!raw) return '';
        const entry = JSON.parse(raw);
        if (!entry?.value || Date.now() > Number(entry.expiresAt || 0)) {
          sessionStorage.removeItem(MY_DANMAKU_CACHE_KEY);
          return '';
        }
        return String(entry.value);
      } catch (_) {
        return '';
      }
    }

    function cacheKey() {
      return `${CACHE_PREFIX}:${state.q}|${state.kinds.join(',')}|${state.sortMode}`;
    }

    function loadCache() {
      try {
        const raw = localStorage.getItem(cacheKey());
        return raw ? JSON.parse(raw) : null;
      } catch (_) {
        return null;
      }
    }

    function saveCache(entry) {
      try {
        localStorage.setItem(cacheKey(), JSON.stringify(entry));
      } catch (_) {}
    }

    function fmtDate(value) {
      if (!value) return '-';
      const d = new Date(value);
      return Number.isNaN(d.getTime()) ? value : d.toLocaleDateString('ja-JP');
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function normalizeKind(kind) {
      const raw = String(kind || '').trim();
      if (!raw) return 'other';
      const lowered = raw.toLowerCase();
      if (KIND_MAP[lowered]) return KIND_MAP[lowered];
      if (KIND_MAP[raw]) return KIND_MAP[raw];
      if (lowered.includes('short') || raw.includes('гӮ·гғ§гғјгғҲ')) return 'short';
      if (lowered.includes('cover') || raw.includes('жӯҢгҒЈгҒҰгҒҝгҒҹ') || raw.includes('жӯҢгҒҝгҒҹ')) return 'cover';
      if (lowered.includes('live') || lowered.includes('stream') || raw.includes('жӯҢжһ ') || raw.includes('й…ҚдҝЎ')) return 'live';
      return 'other';
    }

    function kindLabel(kind) {
      return KIND_LABELS[kind] || 'гҒқгҒ®д»–';
    }

    function dateOf(item) {
      const t = Date.parse(item?.publishedAt || '');
      return Number.isNaN(t) ? 0 : t;
    }

    function eventTargetElement(target) {
      if (target instanceof Element) return target;
      return target?.parentElement || null;
    }

    function isInteractiveTarget(target) {
      const el = eventTargetElement(target);
      return Boolean(el?.closest?.('a, button, input, select, textarea, [role="button"]'));
    }

    function urlsFromText(text) {
      if (!text) return [];
      const matches = String(text).match(/https?:\/\/[^\s)]+/ig) || [];
      return Array.from(new Set(matches.map((url) => url.trim()).filter(Boolean)));
    }

    function normalizeExternalUrl(value) {
      const url = String(value || '').trim();
      return /^https?:\/\//i.test(url) ? url : '';
    }

    function linksForExpanded(item) {
      const singingTagLabel = String(item.singingTag || item.memo || '').trim();
      const directVideoUrl = normalizeExternalUrl(item.singingTagLink || item.liveLink || item.url);
      const relatedVideoUrl = normalizeExternalUrl(item.otherLink);
      const videoUrl = directVideoUrl || relatedVideoUrl;
      const detailUrl = videoUrl || normalizeExternalUrl(item.url);

      return {
        singingTagLabel,
        singingTagUrl: directVideoUrl || videoUrl,
        latestDateUrl: videoUrl,
        detailUrl,
      };
    }

    function resolveSingingTag(text) {
      const raw = String(text || '').trim();
      if (!raw) return { kind: 'other', label: '' };
      const lowered = raw.toLowerCase();

      if (lowered.includes('short') || raw.includes('гӮ·гғ§гғјгғҲ')) {
        return { kind: 'short', label: 'гӮ·гғ§гғјгғҲ' };
      }

      if (lowered.includes('cover') || raw.includes('жӯҢгҒЈгҒҰгҒҝгҒҹ') || raw.includes('жӯҢгҒҝгҒҹ')) {
        return { kind: 'cover', label: 'жӯҢгҒЈгҒҰгҒҝгҒҹ' };
      }

      if (lowered.includes('live') || lowered.includes('stream') || raw.includes('жӯҢжһ ') || raw.includes('й…ҚдҝЎ')) {
        return { kind: 'live', label: '' };
      }

      return { kind: 'other', label: '' };
    }

    function stableSongId(item) {
      const videoId = String(item?.videoId || item?.videoid || item?.video_id || '').trim();
      const title = String(item?.title || '').trim();
      const artist = String(item?.artist || '').trim();
      return [videoId, title, artist].map((part) => encodeURIComponent(part)).join('|');
    }

    async function copyTextToClipboard(text) {
      const normalized = String(text || '').trim();
      if (!normalized) return false;
      try {
        await navigator.clipboard.writeText(normalized);
        return true;
      } catch (_) {
        try {
          const fallbackInput = document.createElement('textarea');
          fallbackInput.value = normalized;
          fallbackInput.setAttribute('readonly', '');
          fallbackInput.style.position = 'fixed';
          fallbackInput.style.top = '-9999px';
          document.body.appendChild(fallbackInput);
          fallbackInput.focus();
          fallbackInput.select();
          const copied = document.execCommand('copy');
          document.body.removeChild(fallbackInput);
          return copied;
        } catch (_) {
          return false;
        }
      }
    }

    function sortItems(items) {
      const sorted = [...items];
      switch (state.sortMode) {
        case 'artist-asc':
          return sorted.sort((a, b) => String(a.artist || '').localeCompare(String(b.artist || ''), 'ja'));
        case 'artist-desc':
          return sorted.sort((a, b) => String(b.artist || '').localeCompare(String(a.artist || ''), 'ja'));
        case 'title-asc':
          return sorted.sort((a, b) => String(a.title || '').localeCompare(String(b.title || ''), 'ja'));
        case 'title-desc':
          return sorted.sort((a, b) => String(b.title || '').localeCompare(String(a.title || ''), 'ja'));
        case 'date-asc':
          return sorted.sort((a, b) => dateOf(a) - dateOf(b));
        case 'date-desc':
        default:
          return sorted.sort((a, b) => dateOf(b) - dateOf(a));
      }
    }

    function collapseExpanded(withSlowAnimation = false) {
      const expandedId = state.expandedSongId;
      state.expandedSongId = '';
      document.documentElement.classList.remove('snap-active');
      const expandedCards = rows.querySelectorAll('.song-card.expanded');
      expandedCards.forEach((card) => {
        if (!withSlowAnimation || card.dataset.id !== expandedId) {
          card.classList.remove('expanded', 'collapsing');
          card.setAttribute('aria-expanded', 'false');
          return;
        }
        card.classList.add('collapsing');
        card.setAttribute('aria-expanded', 'false');
        window.setTimeout(() => {
          card.classList.remove('expanded', 'collapsing');
        }, 340);
      });
    }

    rows?.addEventListener('scroll', () => {
      const currentTop = rows.scrollTop;
      if (Math.abs(currentTop - lastRowsScrollTop) > 2 && state.expandedSongId) {
        collapseExpanded(true);
      }
      lastRowsScrollTop = currentTop;
    }, { passive: true });

    function render(items, totals = {}) {
      selectedCount.textContent = String(items.length);
      totalCount.textContent = String(totals.total ?? items.length);

      if (!items.length) {
        rows.innerHTML = '<div class="muted">и©ІеҪ“гғҮгғјгӮҝгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“</div><div class="dummy-end-card">--- END ---</div>';
        rows.dataset.selected = '{}';
        state.selectedSongId = '';
        collapseExpanded();
        return;
      }

      rows.innerHTML = items.map((item) => {
        const id = stableSongId(item);
        const expanded = state.expandedSongId === id;
        const detailLinks = linksForExpanded(item);
        const singingTagHtml = detailLinks.singingTagLabel
          ? (detailLinks.singingTagUrl
            ? `<a class="tag tag-link song-detail-link" href="${escapeHtml(encodeURI(detailLinks.singingTagUrl))}" target="_blank" rel="noopener noreferrer">${escapeHtml(detailLinks.singingTagLabel)}</a>`
            : `<span class="tag">${escapeHtml(detailLinks.singingTagLabel)}</span>`)
          : '<span class="muted">-</span>';
        const latestDate = escapeHtml(fmtDate(item.lastSungDate || item.publishedAt));
        const latestDateContent = detailLinks.latestDateUrl
          ? `<a class="song-date-link song-detail-link" href="${escapeHtml(encodeURI(detailLinks.latestDateUrl))}" target="_blank" rel="noopener noreferrer" title="${escapeHtml(item.linkLabel || 'жӯҢжһ гғӘгғігӮҜгӮ’й–ӢгҒҸ')}">${latestDate}</a>`
          : latestDate;
        const fallbackLinkLabel = escapeHtml(item.linkLabel || 'й–ўйҖЈгғӘгғігӮҜгӮ’й–ӢгҒҸ');
        const fallbackLinkHtml = detailLinks.detailUrl
          ? `<a class="song-date-link song-detail-link" href="${escapeHtml(encodeURI(detailLinks.detailUrl))}" target="_blank" rel="noopener noreferrer" title="${fallbackLinkLabel}">${fallbackLinkLabel}</a>`
          : '<span class="muted">гғӘгғігӮҜгҒӘгҒ—</span>';
        return `
          <article class="song-card ${expanded ? 'expanded' : ''}" data-id="${id}" tabindex="0" aria-expanded="${expanded ? 'true' : 'false'}">
            <div class="song-card-main">
              <div class="song-summary">
                <div class="song-title">${escapeHtml(item.title || '-')}</div>
                <div class="song-artist">${escapeHtml(item.artist || '-')}</div>
              </div>
              <button class="song-expand-hitarea" type="button" aria-label="и©ізҙ°гӮ’иЎЁзӨә">и©ізҙ°гӮ’й–ӢгҒҸ</button>
            </div>
            <div class="song-details">
              <div class="song-meta">
                <div>${singingTagHtml}</div>
                <div>жңҖзөӮжӯҢе”ұж—Ҙ: ${latestDateContent}</div>
                <div>гғӘгғігӮҜ: ${fallbackLinkHtml}</div>
              </div>
              <button class="icon-btn copy-text-btn" type="button" data-copy-kind="song-artist" title="жҘҪжӣІеҗҚ / гӮўгғјгғҶгӮЈгӮ№гғҲеҗҚгӮ’гӮігғ”гғј" aria-label="жҘҪжӣІеҗҚ / гӮўгғјгғҶгӮЈгӮ№гғҲеҗҚгӮ’гӮігғ”гғј">гӮігғ”гғј</button>
            </div>
          </article>
        `;
      }).join('') + '<div class="dummy-end-card">--- END ---</div>';

      rows.querySelectorAll('.song-card').forEach((el, idx) => {
        const item = items[idx] || {};
        const id = el.dataset.id || '';

        const select = () => {
          state.selectedSongId = id;
          rows.dataset.selected = JSON.stringify(item);
        };

        const toggle = () => {
          select();
          if (state.expandedSongId === id) {
            return;
          }
          state.expandedSongId = id;
          document.documentElement.classList.add('snap-active');
          rows.querySelectorAll('.song-card.expanded').forEach((card) => {
            card.classList.remove('expanded');
            card.setAttribute('aria-expanded', 'false');
          });
          el.classList.add('expanded');
          el.setAttribute('aria-expanded', 'true');
        };

        el.addEventListener('click', (evt) => {
          const targetEl = eventTargetElement(evt.target);
          const detailLink = targetEl?.closest?.('a.song-detail-link, a.song-date-link');
          if (detailLink) {
            evt.stopPropagation();
            return;
          }
          const copyButton = targetEl?.closest?.('button[data-copy-kind]');
          if (copyButton) {
            evt.preventDefault();
            evt.stopPropagation();
            const title = String(item.title || '').trim();
            const artist = String(item.artist || '').trim();
            const text = [title, artist].filter(Boolean).join(' / ');
            copyTextToClipboard(text).then((copied) => {
              setStatus(copied ? 'гӮігғ”гғје®ҢдәҶ' : 'гӮігғ”гғјеӨұж•—', !copied);
            });
            return;
          }

          select();
          const expandZone = targetEl?.closest?.('.song-expand-hitarea');
          if (!expandZone) return;
          if (state.expandedSongId === id) return;
          toggle();
        });

        el.addEventListener('keydown', (evt) => {
          if (isInteractiveTarget(evt.target)) return;
          if (evt.key !== 'Enter' && evt.key !== ' ') return;
          evt.preventDefault();
          select();
          if (state.expandedSongId === id) return;
          toggle();
        });
      });

      if (!rows.querySelector(`.song-card[data-id="${CSS.escape(state.selectedSongId)}"]`)) {
        const first = rows.querySelector('.song-card');
        if (first) {
          state.selectedSongId = first.dataset.id || '';
          rows.dataset.selected = JSON.stringify(items[0] || {});
        }
      }
    }

    function filterItems(items) {
      const q = state.q.toLowerCase();
      const kinds = new Set(state.kinds);
      return sortItems(
        items
          .filter((item) => kinds.has(normalizeKind(item.kind)))
          .filter((item) => {
            if (!q) return true;
            const target = [item.title, item.artist, item.memo].filter(Boolean).join(' ').toLowerCase();
            return target.includes(q);
          }),
      );
    }

    function getWorkersAccountHint() {
      return (
        window.__SONGS_WORKERS_ACCOUNT__
        || document.querySelector('meta[name="songs-workers-account"]')?.content
        || localStorage.getItem('songs_workers_account')
        || ''
      ).trim();
    }

    function guessWorkersApiEndpoints() {
      const host = window.location.hostname || '';
      if (!host.endsWith('.github.io')) return [];

      const owner = host.split('.')[0] || '';
      const account = getWorkersAccountHint() || owner;
      const pathSegments = window.location.pathname.split('/').filter(Boolean);
      const repo = pathSegments[0] || '';
      if (!repo) return [];

      return Array.from(new Set([
        `https://${repo}.workers.dev/api/songs`,
        ...(account ? [`https://${repo}.${account}.workers.dev/api/songs`] : []),
      ]));
    }

    const META_FALLBACK_ENDPOINTS =
      document.querySelector('meta[name="songs-api-fallbacks"]')?.content
        ?.split(',')
        .map((v) => v.trim())
        .filter(Boolean)
      || [];

    const guessedWorkersApis = guessWorkersApiEndpoints();
    const API_FALLBACK_ENDPOINTS = Array.from(new Set([
      ...META_FALLBACK_ENDPOINTS,
      ...guessedWorkersApis,
    ]));

    const API_BASE_OVERRIDE =
      window.__SONGS_API_BASE__
      || document.querySelector('meta[name="songs-api-base"]')?.content
      || localStorage.getItem('songs_api_base')
      || '';

    function apiUrl(path, params) {
      const baseRoot = API_BASE_OVERRIDE || window.location.href;
      const base = new URL(path.replace(/^\/+/, ''), baseRoot);
      if (params) base.search = params.toString();
      return base.toString();
    }

    function withQuery(url, params) {
      const base = new URL(url, window.location.href);
      params.forEach((value, key) => {
        if (!base.searchParams.has(key)) base.searchParams.set(key, value);
      });
      return base.toString();
    }

    function clearApiCache() {
      try {
        localStorage.removeItem(cacheKey());
      } catch (_) {}
    }

    async function load() {
      setStatus('иӘӯиҫј');
      clearErrorLog();

      const params = new URLSearchParams({ q: state.q, kind: 'all', sort: 'latest' });
      const cached = loadCache();
      const requestCandidates = [
        apiUrl('api/songs', params),
        ...API_FALLBACK_ENDPOINTS.map((endpoint) => withQuery(endpoint, params)),
      ];

      let requestUrl = requestCandidates[0];

      if (cached?.payload?.items) {
        const cachedItems = filterItems(Array.isArray(cached.payload.items) ? cached.payload.items : []);
        render(cachedItems, { total: cached?.payload?.total ?? cachedItems.length });
        setStatus(`гӮӯгғЈ${cachedItems.length}`);
      }

      try {
        let res;
        let lastError = null;

        const requestAttemptLogs = [];

        for (const candidateUrl of requestCandidates) {
          requestUrl = candidateUrl;
          try {
            res = await fetch(candidateUrl, {
              headers: cached?.etag ? { 'If-None-Match': cached.etag } : {},
            });
          } catch (fetchErr) {
            lastError = fetchErr;
            requestAttemptLogs.push({ url: candidateUrl, status: 'network_error' });
            continue;
          }

          requestAttemptLogs.push({ url: candidateUrl, status: res.status });

          if (res.ok || res.status === 304) break;

          if (res.status !== 404) {
            const bodyText = await res.text();
            const httpError = new Error(`HTTP ${res.status}`);
            httpError.name = 'HttpResponseError';
            httpError.details = {
              status: res.status,
              statusText: res.statusText,
              headers: headersToObject(res.headers),
              bodyPreview: clipText(bodyText),
              attempts: requestAttemptLogs,
            };
            throw httpError;
          }

          lastError = new Error('HTTP 404');
          lastError.name = 'HttpResponseError';
          lastError.details = { attempts: requestAttemptLogs };
        }

        if (!res) throw lastError || new Error('Fetch failed');

        if (res.status === 304 && cached?.payload) {
          const cachedItems = filterItems(Array.isArray(cached.payload.items) ? cached.payload.items : []);
          render(cachedItems, { total: cached?.payload?.total ?? cachedItems.length });
          setStatus(`жӣҙз„Ў${cachedItems.length}`);
          return;
        }

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        let payload;
        try {
          payload = await res.json();
        } catch (jsonErr) {
          const parseError = new Error('JSON parse failed');
          parseError.name = 'JsonParseError';
          parseError.details = {
            status: res.status,
            statusText: res.statusText,
            headers: headersToObject(res.headers),
          };
          parseError.cause = jsonErr;
          throw parseError;
        }
        const etag = res.headers.get('etag');
        const filteredItems = filterItems(Array.isArray(payload.items) ? payload.items : []);
        render(filteredItems, { total: payload.total ?? filteredItems.length });
        setStatus(`иЎЁзӨә${filteredItems.length}`);

        if (etag) saveCache({ etag, payload });
      } catch (err) {
        if (String(err?.message || '').includes('404')) {
          clearApiCache();
        }
        const statusCode = err?.details?.status || (String(err?.message || '').match(/HTTP\s+(\d{3})/)?.[1] ?? null);
        const detail = {
          timestamp: new Date().toISOString(),
          errorName: err?.name || 'Error',
          statusCode,
          statusDescription: 'йҖҡдҝЎгӮЁгғ©гғј',
        };
        setErrorLog(detail);
        if (!cached?.payload) {
          rows.innerHTML = '<div class="error">гғҮгғјгӮҝеҸ–еҫ—гҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹгҖӮWorker / R2 гҒ®иЁӯе®ҡгӮ’зўәиӘҚгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ</div>';
        }
        setStatus('еӨұж•—', true);
      }
    }

    async function copyDanmaku() {
      const type = byId('danmakuType').value;
      const isCustomDanmaku = type.startsWith('custom:');
      if (!isCustomDanmaku && type !== 'my') {
        setStatus('еҜҫиұЎгҒӘгҒ—', true);
        return;
      }

      let text = '';
      if (type === 'my') text = state.myDanmaku || loadMyDanmakuCache();
      if (isCustomDanmaku) text = type.slice('custom:'.length);

      if (!text.trim()) {
        setStatus(
          type === 'my'
            ? 'ејҫе№•жңӘиЁӯе®ҡ'
            : 'еҜҫиұЎгҒӘгҒ—',
          true,
        );
        return;
      }

      try {
        await navigator.clipboard.writeText(text.trim());
        setStatus('ејҫе№•гӮігғ”');
      } catch (_) {
        setStatus('гӮігғ”гғјеӨұж•—', true);
      }
    }

    function toggleKind(kind) {
      const set = new Set(state.kinds);
      if (set.has(kind)) set.delete(kind);
      else set.add(kind);
      state.kinds = [...set];

      if (state.kinds.length === 0) {
        state.kinds = [...DEFAULT_KINDS];
        byId('kindCover').checked = true;
        byId('kindShort').checked = true;
        byId('kindLive').checked = true;
      }
      load();
    }

    function bind() {
      if (!ENABLE_ERROR_LOG_UI) {
        errorLogWrap.hidden = true;
      }

      byId('q').addEventListener('input', (e) => {
        state.q = e.target.value.trim();
        load();
      });

      byId('kindCover').addEventListener('change', () => toggleKind('cover'));
      byId('kindShort').addEventListener('change', () => toggleKind('short'));
      byId('kindLive').addEventListener('change', () => toggleKind('live'));

      byId('sortField').addEventListener('change', (e) => {
        state.sortField = e.target.value;
        state.sortMode = `${state.sortField}-${state.sortOrder}`;
        load();
      });

      byId('sortOrder').addEventListener('change', (e) => {
        state.sortOrder = e.target.value;
        state.sortMode = `${state.sortField}-${state.sortOrder}`;
        load();
      });

      byId('clear').addEventListener('click', () => {
        state.q = '';
        byId('q').value = '';
        load();
      });

      byId('copyDanmaku').addEventListener('click', copyDanmaku);
      if (ENABLE_ERROR_LOG_UI) {
        byId('copyErrorLog').addEventListener('click', copyErrorLog);
      }

      byId('saveMyDanmaku').addEventListener('click', () => {
        const text = buildMyDanmaku(byId('myEmoji').value);
        saveMyDanmakuCache(text);
        byId('danmakuType').value = 'my';
        const select = byId('danmakuType');
        select.classList.remove('roll-highlight');
        void select.offsetWidth;
        select.classList.add('roll-highlight');
        setSwipeCard(0);
        setStatus('дҪңжҲҗ');
      });

      byId('collapseToggle').addEventListener('click', () => {
        const collapsed = byId('topForm').classList.toggle('collapsed');
        byId('collapseToggle').textContent = collapsed ? 'еұ•й–Ӣ' : 'жҠҳгӮҠз•ігҒҝ';
      });

      byId('scrollTop').addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });

      window.addEventListener('scroll', () => {
        byId('scrollTop').classList.toggle('show', window.scrollY > 280);
      });

      window.addEventListener('wheel', (evt) => {
        if (!state.expandedSongId) return;
        if (Math.abs(evt.deltaY) < 140) return;
        collapseExpanded();
      }, { passive: true });
    }

    byId('sortField').value = state.sortField;
    byId('sortOrder').value = state.sortOrder;
    state.sortMode = `${state.sortField}-${state.sortOrder}`;

    bind();
    setupBottomSwipe();
    state.myDanmaku = loadMyDanmakuCache();
    load();
  </script>
</body>
</html>
