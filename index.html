<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>雲丹ゐくら Songs DB TEST</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #111827;
      --surface-2: #1f2937;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --line: #334155;
      --primary: #38bdf8;
      --accent: #22d3ee;
      --danger: #f87171;
      --focus: #f59e0b;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      background: radial-gradient(circle at top left, #1e293b 0%, var(--bg) 55%);
      color: var(--text);
    }

    .container { max-width: 1080px; margin: 0 auto; display: grid; gap: 16px; }
    .card {
      background: color-mix(in srgb, var(--surface) 90%, black 10%);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
    }

    h1 { margin: 0 0 6px; font-size: 22px; }
    h2 { margin: 0 0 12px; font-size: 17px; }
    .muted { color: var(--muted); font-size: 13px; }
    .status { font-size: 13px; color: var(--muted); }
    .error { color: var(--danger); }

    label { display: grid; gap: 6px; font-size: 13px; color: var(--muted); }

    .top-form input, .top-form select,
    .middle-form input, .middle-form select,
    .bottom-form input, .bottom-form select {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--text);
      min-height: 42px;
      padding: 9px 10px;
      font-size: 15px;
    }

    .top-form button,
    .middle-form button,
    .bottom-form button {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface-2);
      color: var(--text);
      min-height: 42px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 14px;
    }

    button.primary {
      border-color: #0369a1;
      background: linear-gradient(180deg, var(--primary), #0ea5e9);
      color: #001018;
      font-weight: 700;
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    a:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }

    .top-form {
      position: relative;
      padding-bottom: 50px;
      overflow: hidden;
      transition: max-height 0.2s ease;
      max-height: 520px;
    }

    .top-summary {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-bottom: 10px;
    }

    .summary-box {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface-2);
      min-height: 42px;
      display: flex;
      align-items: center;
      padding: 8px 10px;
      font-size: 13px;
      color: var(--text);
    }

    .top-advanced {
      display: grid;
      gap: 10px;
      grid-template-columns: 1.8fr 1.2fr auto;
      align-items: end;
    }

    .top-form.collapsed {
      max-height: 182px;
    }

    .top-form.collapsed .top-advanced { display: none; }

    .toggle-wrap {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 140px;
      display: flex;
      justify-content: flex-end;
    }

    .checkbox-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      padding-top: 2px;
    }

    .checkbox-row label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text);
    }

    .checkbox-row input { width: auto; min-height: auto; }

    .bottom-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: 2fr 1fr auto auto;
      align-items: end;
    }

    @media (max-width: 860px) {
      .top-summary { grid-template-columns: 1fr; }
      .top-advanced { grid-template-columns: 1fr; }
      .bottom-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 560px) {
      .bottom-grid { grid-template-columns: 1fr; }
    }

    table { width: 100%; border-collapse: collapse; }
    th, td {
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      padding: 9px 8px;
      font-size: 14px;
    }
    th { color: var(--muted); font-weight: 600; font-size: 12px; }

    .tag {
      display: inline-block;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      background: #0b2232;
      color: var(--accent);
    }

    #scrollTop {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      display: none;
    }

    #scrollTop.show { display: inline-flex; }
  </style>
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>雲丹ゐくら Songs DB TEST</h1>
      <p class="muted">kasane-3kHz-songs-dbTEST 構成に合わせ、Cloudflare R2 + Worker API 経由で参照するUIです。</p>
    </section>

    <section class="card top-form" id="topForm">
      <h2>上部絞り込みフォーム</h2>
      <div class="top-summary">
        <div class="summary-box">サーバー状態表示: <span class="status" id="status">初期化中...</span></div>
        <div class="summary-box">選択されている楽曲数: <span id="selectedCount">0</span> 曲</div>
      </div>

      <div class="top-advanced">
        <label>絞り込みメニュー
          <div class="checkbox-row">
            <label><input type="checkbox" id="kindLive" checked>歌枠</label>
            <label><input type="checkbox" id="kindCover" checked>歌ってみた</label>
            <label><input type="checkbox" id="kindShort" checked>ショート</label>
          </div>
        </label>
        <label>表示切替メニュー
          <select id="sortMode">
            <option value="artist-asc">アーティスト名 昇順</option>
            <option value="artist-desc">アーティスト名 降順</option>
            <option value="title-asc">楽曲名 昇順</option>
            <option value="title-desc">楽曲名 降順</option>
            <option value="date-asc">投稿日付 昇順</option>
            <option value="date-desc" selected>投稿日付 降順</option>
          </select>
        </label>
        <button class="primary" id="reload" type="button">再読み込み</button>
      </div>

      <div class="toggle-wrap">
        <button id="collapseToggle" type="button">折り畳み</button>
      </div>
    </section>

    <section class="card middle-form">
      <h2>中部楽曲情報フォーム</h2>
      <table>
        <thead>
          <tr>
            <th>弾幕選択</th>
            <th>タイトル</th>
            <th>アーティスト</th>
            <th>種別</th>
            <th>公開日</th>
            <th>リンク</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>

    <section class="card bottom-form">
      <h2>下部検索フォーム</h2>
      <div class="bottom-grid">
        <label>検索フォーム
          <input id="q" type="search" placeholder="曲名 / アーティスト / メモ">
        </label>
        <label>弾幕選択カラム
          <select id="danmakuType">
            <option value="title">曲名</option>
            <option value="artist">アーティスト</option>
            <option value="full">曲名 + アーティスト</option>
          </select>
        </label>
        <button id="clear" type="button">検索クリア</button>
        <button class="primary" id="copyDanmaku" type="button">弾幕コピー</button>
      </div>
    </section>
  </main>

  <button id="scrollTop" class="primary" type="button">↑ 上へ</button>

  <script>
    const state = {
      q: '',
      kinds: ['cover', 'short', 'live'],
      sortMode: 'date-desc',
      selectedSongId: '',
    };

    const byId = (id) => document.getElementById(id);
    const status = byId('status');
    const rows = byId('rows');
    const selectedCount = byId('selectedCount');
    const cachePrefix = 'songs-cache-v3';

    function cacheKey() {
      return `${cachePrefix}:${state.q}|${state.kinds.join(',')}|${state.sortMode}`;
    }

    function loadCache() {
      try {
        const raw = localStorage.getItem(cacheKey());
        return raw ? JSON.parse(raw) : null;
      } catch (_) {
        return null;
      }
    }

    function saveCache(entry) {
      try {
        localStorage.setItem(cacheKey(), JSON.stringify(entry));
      } catch (_) {}
    }

    function fmtDate(value) {
      if (!value) return '-';
      const d = new Date(value);
      return Number.isNaN(d.getTime()) ? value : d.toLocaleDateString('ja-JP');
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function normalizeKind(kind) {
      const map = { cover: 'cover', short: 'short', live: 'live', stream: 'live' };
      return map[String(kind || '').toLowerCase()] || 'other';
    }

    function kindLabel(kind) {
      const labels = { cover: '歌ってみた', short: 'ショート', live: '歌枠', other: 'その他' };
      return labels[kind] || 'その他';
    }

    function dateOf(item) {
      const t = Date.parse(item?.publishedAt || '');
      return Number.isNaN(t) ? 0 : t;
    }

    function sortItems(items) {
      const sorted = [...items];
      switch (state.sortMode) {
        case 'artist-asc':
          return sorted.sort((a, b) => String(a.artist || '').localeCompare(String(b.artist || ''), 'ja'));
        case 'artist-desc':
          return sorted.sort((a, b) => String(b.artist || '').localeCompare(String(a.artist || ''), 'ja'));
        case 'title-asc':
          return sorted.sort((a, b) => String(a.title || '').localeCompare(String(b.title || ''), 'ja'));
        case 'title-desc':
          return sorted.sort((a, b) => String(b.title || '').localeCompare(String(a.title || ''), 'ja'));
        case 'date-asc':
          return sorted.sort((a, b) => dateOf(a) - dateOf(b));
        case 'date-desc':
        default:
          return sorted.sort((a, b) => dateOf(b) - dateOf(a));
      }
    }

    function render(items) {
      selectedCount.textContent = String(items.length);

      if (!items.length) {
        rows.innerHTML = '<tr><td colspan="6" class="muted">該当データがありません</td></tr>';
        rows.dataset.selected = '{}';
        state.selectedSongId = '';
        return;
      }

      rows.innerHTML = items.map((item, index) => {
        const id = `song-${index}-${escapeHtml(item.title || '')}`;
        const checked = state.selectedSongId === id ? 'checked' : '';
        const safeUrl = item.url ? encodeURI(item.url) : '';
        return `
          <tr>
            <td><input type="radio" name="songPick" value="${id}" ${checked}></td>
            <td>${escapeHtml(item.title || '-')}</td>
            <td>${escapeHtml(item.artist || '-')}</td>
            <td><span class="tag">${escapeHtml(kindLabel(normalizeKind(item.kind)))}</span></td>
            <td>${escapeHtml(fmtDate(item.publishedAt))}</td>
            <td>${item.url ? `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer">再生</a>` : '-'}</td>
          </tr>
        `;
      }).join('');

      rows.querySelectorAll('input[type="radio"]').forEach((el, idx) => {
        el.addEventListener('change', () => {
          if (el.checked) {
            state.selectedSongId = el.value;
            rows.dataset.selected = JSON.stringify(items[idx] || {});
          }
        });
      });

      const selectedRadio = rows.querySelector(`input[value="${CSS.escape(state.selectedSongId)}"]`);
      if (!selectedRadio) {
        const first = rows.querySelector('input[type="radio"]');
        if (first) {
          first.checked = true;
          state.selectedSongId = first.value;
          rows.dataset.selected = JSON.stringify(items[0] || {});
        }
      }
    }

    function filterItems(items) {
      const q = state.q.toLowerCase();
      const kinds = new Set(state.kinds);
      return sortItems(
        items
          .filter((item) => kinds.has(normalizeKind(item.kind)))
          .filter((item) => {
            if (!q) return true;
            const target = [item.title, item.artist, item.memo].filter(Boolean).join(' ').toLowerCase();
            return target.includes(q);
          }),
      );
    }

    async function load() {
      status.textContent = '読み込み中...';
      status.classList.remove('error');

      const params = new URLSearchParams({ q: state.q, kind: 'all', sort: 'latest' });
      const cached = loadCache();

      if (cached?.payload?.items) {
        const cachedItems = filterItems(Array.isArray(cached.payload.items) ? cached.payload.items : []);
        render(cachedItems);
        status.textContent = `キャッシュ表示 ${cachedItems.length} / 総数 ${cached.payload.total ?? 0}`;
      }

      try {
        const res = await fetch(`/api/songs?${params.toString()}`, {
          headers: cached?.etag ? { 'If-None-Match': cached.etag } : {},
        });

        if (res.status === 304 && cached?.payload) {
          const cachedItems = filterItems(Array.isArray(cached.payload.items) ? cached.payload.items : []);
          render(cachedItems);
          status.textContent = `更新なし（ETag） 表示 ${cachedItems.length} / 総数 ${cached.payload.total ?? 0}`;
          return;
        }

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const payload = await res.json();
        const etag = res.headers.get('etag');
        const filteredItems = filterItems(Array.isArray(payload.items) ? payload.items : []);
        render(filteredItems);
        status.textContent = `表示 ${filteredItems.length} / 総数 ${payload.total ?? 0}`;

        if (etag) saveCache({ etag, payload });
      } catch (err) {
        console.error(err);
        if (!cached?.payload) {
          rows.innerHTML = '<tr><td colspan="6" class="error">データ取得に失敗しました。Worker / R2 の設定を確認してください。</td></tr>';
        }
        status.classList.add('error');
        status.textContent = `エラー: ${err.message}`;
      }
    }

    async function copyDanmaku() {
      const selected = JSON.parse(rows.dataset.selected || '{}');
      if (!selected.title && !selected.artist) {
        status.textContent = 'コピー対象がありません';
        status.classList.add('error');
        return;
      }

      const type = byId('danmakuType').value;
      let text = selected.title || '';
      if (type === 'artist') text = selected.artist || '';
      if (type === 'full') text = `${selected.title || ''} - ${selected.artist || ''}`;

      try {
        await navigator.clipboard.writeText(text.trim());
        status.classList.remove('error');
        status.textContent = `弾幕コピー完了: ${text.trim()}`;
      } catch (_) {
        status.classList.add('error');
        status.textContent = 'コピーに失敗しました（権限を確認してください）';
      }
    }

    function toggleKind(kind) {
      const set = new Set(state.kinds);
      if (set.has(kind)) set.delete(kind);
      else set.add(kind);
      state.kinds = [...set];

      if (state.kinds.length === 0) {
        state.kinds = ['cover', 'short', 'live'];
        byId('kindCover').checked = true;
        byId('kindShort').checked = true;
        byId('kindLive').checked = true;
      }
      load();
    }

    function bind() {
      byId('q').addEventListener('input', (e) => {
        state.q = e.target.value.trim();
        load();
      });

      byId('kindCover').addEventListener('change', () => toggleKind('cover'));
      byId('kindShort').addEventListener('change', () => toggleKind('short'));
      byId('kindLive').addEventListener('change', () => toggleKind('live'));

      byId('sortMode').addEventListener('change', (e) => {
        state.sortMode = e.target.value;
        load();
      });

      byId('reload').addEventListener('click', load);
      byId('clear').addEventListener('click', () => {
        state.q = '';
        byId('q').value = '';
        load();
      });

      byId('copyDanmaku').addEventListener('click', copyDanmaku);

      byId('collapseToggle').addEventListener('click', () => {
        const collapsed = byId('topForm').classList.toggle('collapsed');
        byId('collapseToggle').textContent = collapsed ? '展開' : '折り畳み';
      });

      byId('scrollTop').addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });

      window.addEventListener('scroll', () => {
        byId('scrollTop').classList.toggle('show', window.scrollY > 280);
      });
    }

    bind();
    load();
  </script>
</body>
</html>
