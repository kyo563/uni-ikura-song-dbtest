<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="songs-r2-json-url" content="https://pub-e333d72512c24eb290119f7f2e0e4bdf.r2.dev/songs.json">
  <title>雲丹ゐくら Songs DB TEST</title>
  <style>
    :root {
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --radius-sm: 8px;
      --radius-md: 12px;
      --control-height: 36px;
      --font-control: 13px;
      --surface: #e6ffff;
      --surface-2: #c6e9f7;
      --text: #0f172a;
      --muted: #334155;
      --line: #334155;
      --primary: #38bdf8;
      --accent: #22d3ee;
      --danger: #f87171;
      --focus: #2fd12f;
      --bg-scroll-darkness: 0;
      --bg-scroll-brightness: 0;
      --scroll-top-offset: 0px;
      --dummy-end-card-height: 72px;
    }

    * { box-sizing: border-box; }
    html,
    body {
      width: 100%;
      height: 100dvh;
      max-width: 100%;
      overflow-x: hidden;
      overflow-y: hidden;
    }

    html {
      background: linear-gradient(180deg, #f9cda0 0%, #f4a645 100%);
    }

    body {
      position: relative;
      isolation: isolate;
      display: flex;
      margin: 0;
      min-height: 100dvh;
      padding: calc(var(--space-4) + env(safe-area-inset-top)) var(--space-4) calc(var(--space-4) + env(safe-area-inset-bottom));
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      background:
        linear-gradient(
          180deg,
          rgb(255 255 255 / calc(var(--bg-scroll-brightness) * 0.6)) 0%,
          rgb(255 255 255 / var(--bg-scroll-brightness)) 100%
        ),
        linear-gradient(
          180deg,
          rgb(0 0 0 / var(--bg-scroll-darkness)) 0%,
          rgb(0 0 0 / calc(var(--bg-scroll-darkness) * 0.8)) 100%
        ),
        linear-gradient(180deg, #f9cda0 0%, #f4a645 100%);
      color: var(--text);
      transition: background 0.25s ease;
      background-attachment: fixed, fixed, fixed;
      background-repeat: no-repeat, no-repeat, no-repeat;
      background-size: 100% 100vh, 100% 100vh, 100% 100vh;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-repeat: repeat;
      opacity: 0.32;
      will-change: background-position;
    }

    body::before {
      background-image:
        radial-gradient(circle at 20% 90%, rgb(255 255 255 / 45%) 0 3px, transparent 4px),
        radial-gradient(circle at 60% 95%, rgb(255 255 255 / 35%) 0 2px, transparent 3px),
        radial-gradient(circle at 85% 88%, rgb(255 255 255 / 40%) 0 2.5px, transparent 3.5px);
      background-size: 220px 320px;
      animation: bubble-rise 13s linear infinite;
    }

    body::after {
      background-image:
        radial-gradient(circle at 10% 96%, rgb(255 255 255 / 30%) 0 1.5px, transparent 2.5px),
        radial-gradient(circle at 42% 92%, rgb(255 255 255 / 38%) 0 2px, transparent 3px),
        radial-gradient(circle at 76% 94%, rgb(255 255 255 / 28%) 0 1.8px, transparent 2.8px);
      background-size: 180px 280px;
      opacity: 0.24;
      animation: bubble-rise 18s linear infinite reverse;
    }

    @keyframes bubble-rise {
      from {
        background-position: 0 120vh, 90px 125vh, 160px 130vh;
      }
      to {
        background-position: 0 -20vh, 90px -15vh, 160px -10vh;
      }
    }

    .container {
      position: relative;
      z-index: 1;
      width: min(100%, 1080px);
      margin: 0 auto;
      display: grid;
      gap: var(--space-3);
      grid-template-rows: auto minmax(0, 1fr) auto;
      min-height: 0;
      flex: 1;
    }
    .card {
      background: #e6ffff;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: var(--space-3);
    }

    h1 { margin: 0 0 var(--space-1); font-size: 21px; }
    h2 { margin: 0 0 var(--space-2); font-size: 16px; }
    .muted { color: var(--muted); font-size: 13px; }
    .status-shell {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-left: 6px;
      padding: 3px 10px 3px 8px;
      border-radius: 999px;
      border: 1px solid color-mix(in srgb, var(--line) 85%, white 15%);
      background: color-mix(in srgb, var(--surface-2) 88%, black 12%);
      overflow: hidden;
      transition: border-color 0.25s ease, background-color 0.25s ease, opacity 0.25s ease;
      opacity: 0.7;
    }

    .status-shell::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 20%, rgb(255 255 255 / 12%) 50%, transparent 80%);
      transform: translateX(-130%);
      opacity: 0;
      pointer-events: none;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #64748b;
      flex: 0 0 auto;
      box-shadow: 0 0 0 2px rgb(15 23 42 / 45%);
      transition: background-color 0.25s ease;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
      transition: color 0.25s ease;
    }

    .status-shell[data-state="ok"] {
      border-color: color-mix(in srgb, var(--line) 88%, #10b981 12%);
      background: color-mix(in srgb, var(--surface-2) 94%, #10b981 6%);
      opacity: 0.62;
    }

    .status-shell[data-state="ok"] .status-dot {
      background: #34d399;
    }

    .status-shell[data-state="loading"] {
      opacity: 0.82;
    }

    .status-shell[data-state="loading"]::before {
      opacity: 1;
      animation: status-shimmer 3.2s ease-in-out infinite;
    }

    .status-shell[data-state="loading"] .status-dot {
      background: #38bdf8;
      animation: status-pulse-soft 2s ease-in-out infinite;
    }

    .status-shell[data-state="error"] {
      border-color: color-mix(in srgb, var(--danger) 55%, #7f1d1d 45%);
      background: color-mix(in srgb, var(--surface-2) 82%, #7f1d1d 18%);
      opacity: 1;
      animation: status-pulse-alert 1.2s ease-in-out infinite;
    }

    .status-shell[data-state="error"] .status-dot {
      background: var(--danger);
      box-shadow: 0 0 0 2px rgb(127 29 29 / 35%), 0 0 10px rgb(248 113 113 / 45%);
    }

    .status-shell[data-state="error"] .status {
      color: #fecaca;
    }

    @keyframes status-pulse-soft {
      0%, 100% { transform: scale(1); opacity: 0.75; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    @keyframes status-shimmer {
      0% { transform: translateX(-130%); }
      100% { transform: translateX(130%); }
    }

    @keyframes status-pulse-alert {
      0%, 100% { box-shadow: 0 0 0 0 rgb(248 113 113 / 0%); }
      50% { box-shadow: 0 0 0 3px rgb(248 113 113 / 15%); }
    }

    @media (prefers-reduced-motion: reduce) {
      .status-shell,
      .status-shell::before,
      .status-dot,
      body::before,
      body::after {
        animation: none !important;
        transition: none;
      }

      .bottom-swipe-track.hinting {
        animation: none !important;
      }
    }

    label { display: grid; gap: var(--space-1); font-size: 13px; color: var(--muted); }

    .card :is(input, select) {
      width: 100%;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--text);
      min-height: var(--control-height);
      padding: var(--space-2) var(--space-3);
      font-size: var(--font-control);
    }

    .card button {
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      color: var(--text);
      min-height: var(--control-height);
      padding: var(--space-2) var(--space-3);
      cursor: pointer;
      font-size: var(--font-control);
      font-weight: 600;
    }

    button.primary {
      border-color: #0369a1;
      background: linear-gradient(180deg, var(--primary), #0ea5e9);
      color: #001018;
      font-weight: 700;
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    a:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }

    .top-form {
      position: relative;
      padding-bottom: 20px;
      overflow: visible;
      --top-expanded-height: 170px;
      --top-collapsed-height: 0px;
    }

    .top-swipe-wrap {
      overflow: hidden;
      width: 100%;
      min-height: 170px;
      height: var(--top-expanded-height);
      transition: height 0.25s ease;
    }

    .top-form.collapsed .top-swipe-wrap {
      height: var(--top-collapsed-height);
    }

    .top-form.collapsed {
      padding: 0;
      border-color: transparent;
      background: transparent;
      box-shadow: none;
      min-height: 24px;
    }

    .top-swipe-track {
      display: flex;
      width: 200%;
      transform: translateX(0%);
      transition: transform 0.45s cubic-bezier(0.2, 0.9, 0.2, 1);
      touch-action: pan-y;
    }

    .top-swipe-track.dragging {
      transition: none;
      cursor: grabbing;
    }

    .top-panel {
      width: 50%;
      min-width: 0;
    }

    .memo-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      padding: var(--space-2);
      min-height: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    #memoInput {
      width: 100%;
      min-height: 0;
      height: auto;
      flex: 1;
      resize: none;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: #e6ffff;
      color: var(--text);
      padding: var(--space-2) var(--space-3);
      font-size: var(--font-control);
      font-family: inherit;
      line-height: 1.5;
    }

    .top-summary {
      margin-bottom: var(--space-2);
    }

    .summary-box {
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      min-height: var(--control-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: nowrap;
      gap: 4px 10px;
      padding: var(--space-2) var(--space-3);
      font-size: 12px;
      color: var(--text);
    }

    .summary-inline {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }

    .summary-inline.count-inline {
      display: none;
    }

    .count-inline {
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .error-log-wrap {
      margin-top: var(--space-2);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      padding: var(--space-2);
      display: none;
      gap: var(--space-2);
    }

    .error-log-wrap.show {
      display: grid;
    }

    .error-log-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .error-log {
      margin: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: #0b1220;
      color: #dbeafe;
      padding: var(--space-2);
      max-height: 280px;
      overflow: auto;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .top-advanced {
      display: grid;
      gap: var(--space-2);
      grid-template-columns: 1.5fr auto;
      align-items: end;
    }

    .sort-row {
      display: grid;
      gap: var(--space-2);
      grid-template-columns: auto auto;
      align-items: end;
      justify-content: start;
    }

    .sort-row label {
      min-width: 0;
    }

    .sort-row select,
    .sort-row button {
      width: fit-content;
      min-width: 112px;
    }

    .top-fold-btn,
    .top-expand-btn {
      position: absolute;
      left: var(--space-2);
      bottom: var(--space-1);
      border: 0 !important;
      background: transparent !important;
      font-size: 11px !important;
      min-height: auto !important;
      min-width: 0;
      padding: 0;
      white-space: nowrap;
      color: var(--muted);
    }

    .top-expand-btn {
      display: none;
    }

    .top-form:not(.collapsed) .top-expand-btn {
      display: none;
    }

    .top-form.collapsed .top-fold-btn {
      display: none;
    }

    .top-form.collapsed .top-advanced {
      grid-template-columns: 1fr;
      align-items: start;
    }

    .sort-row {
      max-height: 120px;
      opacity: 1;
      overflow: hidden;
      transition: max-height 0.2s ease, opacity 0.2s ease;
    }

    .top-form.collapsed .sort-row {
      max-height: 0;
      opacity: 0;
      pointer-events: none;
    }

    .top-form.collapsed .top-expand-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .checkbox-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
      padding-top: 2px;
      align-items: center;
    }

    .checkbox-row label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text);
    }

    .checkbox-row input {
      width: auto;
      min-height: auto;
      accent-color: #3dff3d;
    }

    .bottom-grid {
      display: grid;
      gap: var(--space-2);
      grid-template-columns: 1fr;
      align-items: end;
    }

    .bottom-static-controls {
      margin-top: var(--space-2);
    }

    .bottom-form {
      position: fixed;
      bottom: calc(var(--space-4) + env(safe-area-inset-bottom));
      z-index: 60;
      box-shadow: 0 12px 22px rgb(15 23 42 / 24%);
    }

    .ratio-8-2 {
      display: grid;
      gap: var(--space-2);
      grid-template-columns: 8fr 2fr;
      align-items: end;
    }


    .search-inline {
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
    }

    #clear {
      min-width: 72px;
      width: auto;
      padding-left: var(--space-2);
      padding-right: var(--space-2);
      white-space: nowrap;
      justify-self: end;
    }

    .bottom-swipe-wrap {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: color-mix(in srgb, var(--surface-2) 96%, white 4%);
    }

    .bottom-swipe-track {
      display: flex;
      width: 200%;
      transform: translateX(0%);
      transition: transform 0.45s cubic-bezier(0.2, 0.9, 0.2, 1);
      touch-action: pan-y;
    }

    .bottom-swipe-track.hinting {
      animation: swipe-hint 2.2s ease-in-out infinite;
    }

    .bottom-swipe-track.dragging {
      transition: none;
      cursor: grabbing;
    }

    .bottom-panel {
      width: 50%;
      padding: var(--space-1) var(--space-2);
      display: grid;
      gap: var(--space-1);
      min-width: 0;
    }

    @keyframes swipe-hint {
      0%,
      68%,
      100% { transform: translateX(0%); }
      34% { transform: translateX(-12%); }
    }

    @media (max-width: 860px) {
      body { padding: var(--space-2); }
      .card :is(input, select) { font-size: 16px; }
      .container {
        width: 100%;
        gap: var(--space-2);
        min-height: calc(100dvh - (var(--space-2) * 2));
        grid-template-rows: auto minmax(0, 1fr) auto;
      }
      .card,
      .top-form,
      .middle-form,
      .bottom-form { width: 100%; }
      .card { padding: var(--space-2); }
      .bottom-form {
        bottom: calc(var(--space-2) + env(safe-area-inset-bottom));
      }
      .top-summary { grid-template-columns: 1fr; }
      .top-advanced { grid-template-columns: 1fr; gap: var(--space-2); }
      .sort-row { grid-template-columns: auto auto; }
      .sort-row select,
      .sort-row button { min-width: 96px; }
      .memo-actions { grid-template-columns: auto; }
      .memo-actions .memo-spacer { display: none; }
      .ratio-8-2 { grid-template-columns: 1fr; }
      .bottom-static-controls .ratio-8-2 {
        grid-template-columns: minmax(0, 1fr) auto;
        gap: var(--space-1);
      }
      .bottom-static-controls #copyDanmaku {
        min-width: 64px;
        padding-left: var(--space-2);
        padding-right: var(--space-2);
        white-space: nowrap;
      }
      .search-inline { grid-template-columns: minmax(0, 1fr) auto; }
      .summary-box { font-size: 11px; }
      .middle-form {
        display: flex;
        min-height: 0;
      }
      .song-cards {
        flex: 1;
        height: 100%;
        max-height: none;
      }
    }

    @media (min-width: 861px) {
      .top-fold-btn,
      .top-expand-btn {
        display: none !important;
      }

      .top-swipe-wrap {
        height: var(--top-expanded-height);
      }
    }

    .song-cards {
      display: grid;
      gap: var(--space-1);
      overflow-y: auto;
      min-height: 0;
      height: 100%;
      padding-right: 0;
    }

    .middle-form {
      display: flex;
      min-height: 0;
      padding: 0;
      background: transparent;
      border: 0;
    }

    .song-card {
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: #e6ffff;
      padding: var(--space-2);
      width: 100%;
      transition: border-color 0.2s ease, opacity 0.25s ease, box-shadow 0.2s ease;
      scroll-snap-align: start;
    }

    .song-card.expanded {
      border-color: color-mix(in srgb, var(--line) 65%, var(--accent) 35%);
      box-shadow: 0 8px 18px rgb(2 132 199 / 22%);
    }

    .song-card-main {
      display: grid;
      gap: var(--space-2);
    }

    .song-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: var(--space-2);
      align-items: center;
    }

    .song-summary { display: grid; gap: 2px; font-size: 13px; min-width: 0; }
    .song-title { font-weight: 700; }
    .song-artist { color: var(--muted); font-size: 13px; }

    .song-details {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      align-items: start;
      margin-top: var(--space-2);
      padding-top: var(--space-2);
      border-top: 1px solid var(--line);
      gap: var(--space-2);
      font-size: 13px;
    }

    .song-meta { display: grid; gap: var(--space-1); min-width: 0; }

    .song-meta-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-2);
      min-width: 0;
    }

    .song-meta-latest {
      margin-left: auto;
      text-align: right;
      white-space: nowrap;
    }

    .song-date-link {
      color: #ff8c00;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    button.song-date-link {
      border: 0;
      background: transparent;
      padding: 0;
      font: inherit;
      cursor: pointer;
    }

    .icon-btn {

      min-height: 32px;
      padding: var(--space-1) var(--space-2);
    }

    .copy-text-btn {
      white-space: nowrap;
      min-width: 74px;
    }


    .tag {

      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px var(--space-2);
      font-size: 12px;
      background: #1e90ff;
      color: #ffffff;
    }

    .tag-link {
      text-decoration: none;
      cursor: pointer;
    }

    .song-detail-link,
    .song-detail-link:visited {
      color: #ff8c00;
    }

    .song-detail-link:hover,
    .song-detail-link:focus-visible {
      color: #ffad33;
    }

    #copyErrorLog,
    #copyMemo,
    #copyDanmaku,
    .copy-text-btn {
      background: #1e90ff;
      color: #ffffff;
    }

    .memo-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: var(--space-2);
      align-items: end;
    }

    .memo-actions .memo-spacer {
      min-height: var(--control-height);
    }

    .song-link-row {
      min-width: 0;
      text-align: left;
    }

    .song-link-inline {
      display: inline-flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: var(--space-2);
      min-width: 0;
      text-align: left;
    }

    .song-link-title {
      display: inline-block;
      max-width: min(100%, 52ch);
      min-width: 0;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
      text-align: left;
    }

    .song-preview-card {
      display: block;
      position: relative;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      overflow: hidden;
      width: min(100%, 420px);
      aspect-ratio: 16 / 9;
      background: #0f172a;
    }

    .song-preview-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .song-preview-label {
      position: absolute;
      left: var(--space-2);
      bottom: var(--space-2);
      margin: 0;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      background: rgb(15 23 42 / 70%);
      color: #e2e8f0;
      backdrop-filter: blur(2px);
    }

    .song-preview-wrap {
      display: none;
      margin-top: var(--space-1);
      width: 100%;
      justify-content: center;
    }

    .song-card.preview-visible .song-preview-wrap {
      display: flex;
    }

    .tag-link:hover { filter: brightness(1.1); }

    @media (max-width: 768px) {
      .song-card {
        cursor: pointer;
      }

      .song-link-title {
        max-width: 100%;
      }

      .my-danmaku-row {
        grid-template-columns: 6fr 4fr;
      }

      .song-card .song-details {
        display: none;
      }

      .song-card.expanded .song-details {
        display: grid;
      }
    }

    #scrollTop {
      position: fixed;
      right: var(--space-4);
      bottom: calc(var(--space-4) + var(--scroll-top-offset));
      z-index: 20;
      display: none;
    }

    #scrollTop.show { display: inline-flex; }

    .my-danmaku-form {
      display: grid;
      gap: var(--space-2);
    }

    .my-danmaku-row {
      display: grid;
      gap: var(--space-2);
      grid-template-columns: minmax(0, 1fr) max-content;
      align-items: end;
    }

    #myEmoji {
      width: 100%;
      min-width: 0;
      padding-left: 8px;
      padding-right: 8px;
    }

    .roll-highlight {
      animation: roll-highlight 0.45s ease;
    }

    @keyframes roll-highlight {
      0% { transform: translateY(-6px); filter: brightness(1); }
      45% { transform: translateY(2px); filter: brightness(1.2); }
      100% { transform: translateY(0); filter: brightness(1); }
    }

    .dummy-end-card {
      border: 1px dashed var(--line);
      border-radius: var(--radius-sm);
      padding: var(--space-2);
      min-height: var(--dummy-end-card-height);
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      display: grid;
      place-items: center;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%) translateY(6px);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 12px;
      background: color-mix(in srgb, var(--surface-2) 94%, black 6%);
      color: var(--text);
      font-size: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s ease, transform 0.12s ease;
      z-index: 30;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .scroll-bubbles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 40;
      overflow: hidden;
    }

    .scroll-bubble {
      position: absolute;
      bottom: -24px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgb(255 255 255 / 85%), rgb(255 255 255 / 20%));
      animation: pop-bubble 1.8s ease-out forwards;
      opacity: 0;
    }

    @keyframes pop-bubble {
      0% { transform: translateY(0) scale(0.7); opacity: 0.1; }
      16% { opacity: 0.65; }
      100% { transform: translateY(-180px) scale(1.18); opacity: 0; }
    }

  </style>
</head>

              <option value="custom:✩࿐⋆*🍼👶 ﾟ·꒰ঌ ﾊﾞｯﾌﾞｰ ໒꒱· ﾟ👶🍼✩࿐⋆*">✩࿐⋆*🍼👶…(🍼)</option>

  <button id="scrollTop" class="primary" type="button">↑ 上へ</button>
  <div id="toast" class="toast" aria-live="polite" role="status"></div>

  <script>
    const DEFAULT_KINDS = ['cover', 'short', 'live'];
    const KIND_MAP = {
      cover: 'cover',
      short: 'short',
      live: 'live',
      stream: 'live',
      '歌ってみた': 'cover',
      '歌みた': 'cover',
      'ショート': 'short',
      '歌枠': 'live',
      '配信': 'live',
    };
    const KIND_LABELS = { cover: '歌ってみた', short: 'ショート', live: '歌枠', other: 'その他' };
    const CACHE_PREFIX = 'songs-cache-v3';
    const MY_DANMAKU_CACHE_KEY = 'my-danmaku-cache-v1';
    const MY_DANMAKU_CACHE_MS = 15 * 60 * 1000;
    const SWIPE_HINT_INTERVAL_MS = 3 * 60 * 1000;

    const state = {
      q: '',
      kinds: [...DEFAULT_KINDS],
      sortMode: 'date-desc',
      sortField: 'date',
      sortOrder: 'desc',
      selectedSongId: '',
      myDanmaku: '',
    };

    const byId = (id) => document.getElementById(id);
    const status = byId('status');
    const rows = byId('rows');
    const selectedCount = byId('selectedCount');
    const totalCount = byId('totalCount');
    const toast = byId('toast');
    const errorLogWrap = byId('errorLogWrap');
    const errorLog = byId('errorLog');
    const scrollBubbles = byId('scrollBubbles');
    const MAX_ERROR_BODY_CHARS = 4000;
    const ENABLE_ERROR_LOG_UI = true;
    let latestErrorLogText = '';

    const statusShell = byId('statusShell');
    let toastTimer = null;

    function setStatus(text, isError = false) {
      status.textContent = text;
      if (isError) {
        statusShell.dataset.state = 'error';
        return;
      }
      statusShell.dataset.state = text.includes('読込') ? 'loading' : 'ok';
    }

    function showToast(text, durationMs = 300) {
      if (!toast || !text) return;
      toast.textContent = text;
      toast.classList.add('show');
      if (toastTimer) window.clearTimeout(toastTimer);
      toastTimer = window.setTimeout(() => {
        toast.classList.remove('show');
      }, durationMs);
    }

    function clipText(value, max = MAX_ERROR_BODY_CHARS) {
      const text = String(value ?? '');
      if (text.length <= max) return text;
      return `${text.slice(0, max)}\n...<truncated ${text.length - max} chars>`;
    }

    function headersToObject(headers) {
      const picked = ['content-type', 'cache-control', 'etag', 'cf-ray', 'server', 'date'];
      const obj = {};
      for (const key of picked) {
        const value = headers.get(key);
        if (value) obj[key] = value;
      }
      return obj;
    }

    function setErrorLog(logObject) {
      latestErrorLogText = JSON.stringify(logObject, null, 2);
      if (ENABLE_ERROR_LOG_UI) {
        errorLog.textContent = latestErrorLogText;
        errorLogWrap.classList.add('show');
        syncTopPanelSize();
      }
      console.error('songs-db-detailed-error', logObject);
    }

    function clearErrorLog() {
      latestErrorLogText = '';
      if (ENABLE_ERROR_LOG_UI) {
        errorLog.textContent = 'エラー時に情報を表示します。';
      }
      errorLogWrap.classList.remove('show');
      syncTopPanelSize();
    }

    async function copyErrorLog() {
      if (!latestErrorLogText) {
        setStatus('ログなし', true);
        return;
      }
      try {
        await navigator.clipboard.writeText(latestErrorLogText);
        setStatus('ログコピー');
      } catch (_) {
        setStatus('ログ失敗', true);
      }
    }

    let setSwipeCard = () => {};
    let setTopSwipeCard = () => {};
    let getTopSwipeCard = () => 0;
    let triggerSwipeHint = () => {};
    let swipeHintIntervalId = null;
    let topFormCollapsedByScroll = false;

    function setupSwipeTrack({ wrap, track, panelWidthPercent = 50, onCardChange = null }) {
      let current = 0;
      let dragging = false;
      let startX = 0;
      let deltaX = 0;
      let pointerId = null;

      const setCard = (index, withAnimation = true) => {
        current = Math.max(0, Math.min(1, index));
        track.style.transition = withAnimation
          ? 'transform 0.45s cubic-bezier(0.2, 0.9, 0.2, 1)'
          : 'none';
        track.style.transform = `translateX(${-current * panelWidthPercent}%)`;
        if (typeof onCardChange === 'function') {
          onCardChange(current);
        }
      };

      const getThreshold = () => Math.max(54, wrap.clientWidth * 0.12);

      const onPointerMove = (evt) => {
        if (!dragging || evt.pointerId !== pointerId) return;
        deltaX = evt.clientX - startX;
        const base = -current * panelWidthPercent;
        const ratio = (deltaX / wrap.clientWidth) * panelWidthPercent;
        const next = Math.max(-panelWidthPercent, Math.min(0, base + ratio));
        track.style.transform = `translateX(${next}%)`;
      };

      const onPointerUp = (evt) => {
        if (!dragging || evt.pointerId !== pointerId) return;
        dragging = false;
        track.classList.remove('dragging');
        track.releasePointerCapture(pointerId);
        const threshold = getThreshold();
        if (Math.abs(deltaX) > threshold) {
          if (deltaX < 0) setCard(current + 1);
          else setCard(current - 1);
        } else {
          setCard(current);
        }
        pointerId = null;
        deltaX = 0;
      };

      track.addEventListener('pointerdown', (evt) => {
        if (evt.pointerType === 'mouse' && evt.button !== 0) return;
        dragging = true;
        startX = evt.clientX;
        deltaX = 0;
        pointerId = evt.pointerId;
        track.classList.add('dragging');
        track.setPointerCapture(pointerId);
      });

      track.addEventListener('pointermove', onPointerMove);
      track.addEventListener('pointerup', onPointerUp);
      track.addEventListener('pointercancel', onPointerUp);

      setCard(0, false);
      return {
        setCard,
        getCurrent: () => current,
      };
    }


    function syncTopPanelSize() {
      const filterPanel = document.querySelector('.top-panel[aria-label="絞り込みカード"]');
      const topForm = byId('topForm');
      if (!filterPanel || !topForm) return;

      const hasCollapsed = topForm.classList.contains('collapsed');

      topForm.classList.remove('collapsed');
      const expandedHeight = Math.ceil(filterPanel.getBoundingClientRect().height);

      topForm.classList.add('collapsed');
      const collapsedHeight = Math.ceil(filterPanel.getBoundingClientRect().height);

      if (!hasCollapsed) topForm.classList.remove('collapsed');

      if (expandedHeight > 0) {
        topForm.style.setProperty('--top-expanded-height', `${expandedHeight}px`);
      }
      if (collapsedHeight > 0) {
        topForm.style.setProperty('--top-collapsed-height', `${collapsedHeight}px`);
      }
    }

    function setupTopSwipe() {
      const wrap = byId('topSwipeWrap');
      const track = byId('topSwipeTrack');
      const memoInput = byId('memoInput');
      const memoPanel = document.querySelector('.memo-panel');
      const topForm = byId('topForm');
      const collapseButton = byId('collapseTopMenu');
      const expandButton = byId('expandTopMenu');

      if (!wrap || !track) return;
      const topSwipe = setupSwipeTrack({
        wrap,
        track,
        panelWidthPercent: 50,
        onCardChange: (index) => {
          const isMemo = index === 1;
          topForm?.classList.toggle('memo-active', isMemo);
          if (isMemo && topForm?.classList.contains('collapsed')) {
            topForm.classList.remove('collapsed');
            topFormCollapsedByScroll = false;
          }
          syncTopPanelSize();
        },
      });
      setTopSwipeCard = topSwipe.setCard;
      getTopSwipeCard = topSwipe.getCurrent;

      if (memoInput) {
        memoInput.addEventListener('focus', () => {
          setTopSwipeCard(1);
        });
      }

      if (memoPanel) {
        memoPanel.addEventListener('click', () => {
          if (!topForm?.classList.contains('collapsed')) return;
          topForm.classList.remove('collapsed');
          topFormCollapsedByScroll = false;
          syncTopPanelSize();
        });
      }

      collapseButton?.addEventListener('click', () => {
        if (!isMobileLayout() || !topForm) return;
        topForm.classList.add('collapsed');
        topFormCollapsedByScroll = true;
        syncTopPanelSize();
      });

      expandButton?.addEventListener('click', () => {
        if (!topForm) return;
        topForm.classList.remove('collapsed');
        topFormCollapsedByScroll = false;
        syncTopPanelSize();
      });

      syncTopPanelSize();
      window.addEventListener('resize', syncTopPanelSize);
    }

    function setupBottomSwipe() {
      const wrap = byId('bottomSwipeWrap');
      const track = byId('bottomSwipeTrack');
      const stopHint = () => {
        track.classList.remove('hinting');
      };

      const startHint = () => {
        track.classList.remove('hinting');
        void track.offsetWidth;
        track.classList.add('hinting');
        window.setTimeout(() => {
          track.classList.remove('hinting');
        }, 6500);
      };

      const bottomSwipe = setupSwipeTrack({ wrap, track, panelWidthPercent: 50 });
      const setCard = bottomSwipe.setCard;

      track.addEventListener('pointerdown', () => {
        stopHint();
      });
      byId('q').addEventListener('focus', stopHint, { once: true });
      byId('myEmoji').addEventListener('focus', stopHint, { once: true });

      byId('danmakuType').addEventListener('change', (evt) => {
        if (evt.target.value === 'my') setCard(1);
      });

      byId('saveMyDanmaku').addEventListener('click', () => {
        setCard(0);
      });

      setSwipeCard = setCard;
      triggerSwipeHint = startHint;

      startHint();
    }


    function createScrollBubbles(mode = 'normal') {
      if (!scrollBubbles) return;
      if (scrollBubbles.childElementCount > 0) return;
      const burst = mode === 'burst';
      const bubbleCount = burst ? 6 : 2;
      for (let i = 0; i < bubbleCount; i += 1) {
        const bubble = document.createElement('span');
        bubble.className = 'scroll-bubble';
        const size = burst ? 12 + Math.random() * 24 : 8 + Math.random() * 18;
        bubble.style.left = `${6 + Math.random() * 88}%`;
        bubble.style.width = `${size}px`;
        bubble.style.height = `${size}px`;
        bubble.style.animationDelay = `${i * 0.08}s`;
        bubble.style.animationDuration = burst
          ? `${1.2 + Math.random() * 0.9}s`
          : `${1.4 + Math.random() * 1.3}s`;
        scrollBubbles.appendChild(bubble);
        window.setTimeout(() => bubble.remove(), 4000);
      }
    }

    function collapseExpandedWhenOutOfView() {
      if (!isMobileLayout()) return;
      const activeCards = rows.querySelectorAll('.song-card.expanded, .song-card.preview-visible');
      if (!activeCards.length) return;
      const rowsRect = rows.getBoundingClientRect();
      activeCards.forEach((card) => {
        const cardRect = card.getBoundingClientRect();
        const isOutOfView = cardRect.bottom <= rowsRect.top || cardRect.top >= rowsRect.bottom;
        if (!isOutOfView) return;
        card.classList.remove('expanded');
        if (card.classList.contains('preview-visible')) {
          card.classList.remove('preview-visible');
          const toggleBtn = card.querySelector('button[data-preview-toggle]');
          if (toggleBtn) {
            toggleBtn.textContent = '▶リンクを開く';
            toggleBtn.setAttribute('aria-expanded', 'false');
          }
        }
      });
    }

    function updateMiddleCardsHeight() {
      if (!rows || !isMobileLayout()) {
        rows?.style.removeProperty('max-height');
        return;
      }

      const bottomForm = document.querySelector('.bottom-form');
      if (!bottomForm) return;

      const rowsRect = rows.getBoundingClientRect();
      const bottomRect = bottomForm.getBoundingClientRect();
      const available = Math.floor(bottomRect.bottom - rowsRect.top - 4);
      if (available > 120) {
        rows.style.maxHeight = `${available}px`;
      }
    }

    function updateDummyEndCardHeight() {
      const searchPanel = document.querySelector('.bottom-panel[aria-label="検索フォームカード"]');
      if (!searchPanel) return;
      const height = Math.ceil(searchPanel.getBoundingClientRect().height * 2);
      if (height > 0) {
        document.documentElement.style.setProperty('--dummy-end-card-height', `${height}px`);
      }
    }

    function buildMyDanmaku(emoji) {
      const raw = (emoji || '').trim();
      const safeEmoji = raw || '🙂';
      const emojiLength = Array.from(safeEmoji).length;
      const repeat = emojiLength >= 3 ? 2 : 3;
      return `🍣🧡${safeEmoji}`.repeat(repeat);
    }

    function saveMyDanmakuCache(text) {
      const entry = { value: text, expiresAt: Date.now() + MY_DANMAKU_CACHE_MS };
      state.myDanmaku = text;
      try {
        sessionStorage.setItem(MY_DANMAKU_CACHE_KEY, JSON.stringify(entry));
      } catch (_) {}
    }

    function loadMyDanmakuCache() {
      try {
        const raw = sessionStorage.getItem(MY_DANMAKU_CACHE_KEY);
        if (!raw) return '';
        const entry = JSON.parse(raw);
        if (!entry?.value || Date.now() > Number(entry.expiresAt || 0)) {
          sessionStorage.removeItem(MY_DANMAKU_CACHE_KEY);
          return '';
        }
        return String(entry.value);
      } catch (_) {
        return '';
      }
    }

    function cacheKey() {
      return `${CACHE_PREFIX}:${state.q}|${state.kinds.join(',')}|${state.sortMode}`;
    }

    function loadCache() {
      try {
        const raw = localStorage.getItem(cacheKey());
        return raw ? JSON.parse(raw) : null;
      } catch (_) {
        return null;
      }
    }

    function saveCache(entry) {
      try {
        localStorage.setItem(cacheKey(), JSON.stringify(entry));
      } catch (_) {}
    }

    function fmtDate(value) {
      if (!value) return '-';
      const d = new Date(value);
      return Number.isNaN(d.getTime()) ? value : d.toLocaleDateString('ja-JP');
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function normalizeKind(kind) {
      const raw = String(kind || '').trim();
      if (!raw) return 'other';
      const lowered = raw.toLowerCase();
      if (KIND_MAP[lowered]) return KIND_MAP[lowered];
      if (KIND_MAP[raw]) return KIND_MAP[raw];
      if (lowered.includes('short') || raw.includes('ショート')) return 'short';
      if (lowered.includes('cover') || raw.includes('歌ってみた') || raw.includes('歌みた')) return 'cover';
      if (lowered.includes('live') || lowered.includes('stream') || raw.includes('歌枠') || raw.includes('配信')) return 'live';
      return 'other';
    }

    function kindLabel(kind) {
      return KIND_LABELS[kind] || 'その他';
    }

    function dateOf(item) {
      const t = Date.parse(item?.publishedAt || '');
      return Number.isNaN(t) ? 0 : t;
    }

    function eventTargetElement(target) {
      if (target instanceof Element) return target;
      return target?.parentElement || null;
    }

    function isInteractiveTarget(target) {
      const el = eventTargetElement(target);
      return Boolean(el?.closest?.('a, button, input, select, textarea, [role="button"]'));
    }

    function urlsFromText(text) {
      if (!text) return [];
      const matches = String(text).match(/https?:\/\/[^\s)]+/ig) || [];
      return Array.from(new Set(matches.map((url) => url.trim()).filter(Boolean)));
    }

    function hrefUrlsFromHtml(text) {
      if (!text) return [];
      const source = String(text);
      const urls = [];
      const hrefPattern = /<a\b[^>]*\bhref\s*=\s*(?:"([^"]+)"|'([^']+)'|([^\s>]+))/ig;
      let match;
      while ((match = hrefPattern.exec(source)) !== null) {
        const candidate = normalizeExternalUrl(match[1] || match[2] || match[3]);
        if (candidate) urls.push(candidate);
      }
      return Array.from(new Set(urls));
    }

    function normalizeExternalUrl(value) {
      const url = String(value || '').trim();
      return /^https?:\/\//i.test(url) ? url : '';
    }

    function bestExternalUrl(value) {
      const direct = normalizeExternalUrl(value);
      if (direct) return direct;

      const hrefUrl = hrefUrlsFromHtml(value)[0];
      if (hrefUrl) return hrefUrl;

      return urlsFromText(value)[0] || '';
    }

    function linksForExpanded(item) {
      const rawTagText = String(item.singingTag || item.memo || '').trim();
      const resolvedTag = resolveSingingTag(rawTagText);
      const singingTagLabel = resolvedTag.label || rawTagText;

      const liveUrl =
        bestExternalUrl(item.liveLink) ||
        bestExternalUrl(item.singingTagLink);

      const detailUrl = liveUrl || bestExternalUrl(item.url);

      return {
        singingTagLabel,
        singingTagUrl: liveUrl,
        latestDateUrl: liveUrl,
        detailUrl,
      };
    }

    function extractVideoPreview(url) {
      const raw = String(url || '').trim();
      if (!raw) return null;

      let parsed;
      try {
        parsed = new URL(raw);
      } catch (_) {
        return null;
      }

      const host = parsed.hostname.toLowerCase();
      const path = parsed.pathname;

      if (host.includes('youtube.com') || host.includes('youtu.be')) {
        let videoId = '';
        if (host.includes('youtu.be')) {
          videoId = path.split('/').filter(Boolean)[0] || '';
        } else {
          videoId = parsed.searchParams.get('v') || '';
          if (!videoId && path.startsWith('/shorts/')) {
            videoId = path.split('/')[2] || '';
          }
          if (!videoId && path.startsWith('/embed/')) {
            videoId = path.split('/')[2] || '';
          }
        }

        if (!videoId) return null;
        return {
          type: 'YouTube',
          thumbnailUrl: `https://i.ytimg.com/vi/${encodeURIComponent(videoId)}/hqdefault.jpg`,
        };
      }

      if (host.includes('nicovideo.jp') || host.includes('nico.ms')) {
        const idMatch = `${parsed.pathname}${parsed.search}${parsed.hash}`.match(/(?:sm|nm|so)(\d+)/i);
        if (!idMatch) return null;
        const numericId = idMatch[1];
        return {
          type: 'ニコニコ動画',
          thumbnailUrl: `https://tn.smilevideo.jp/smile?i=${encodeURIComponent(numericId)}`,
        };
      }

      return null;
    }

    function resolveSingingTag(text) {
      const raw = String(text || '').trim();
      if (!raw) return { kind: 'other', label: '' };
      const lowered = raw.toLowerCase();

      if (lowered.includes('short') || raw.includes('ショート')) {
        return { kind: 'short', label: 'ショート' };
      }

      if (lowered.includes('cover') || raw.includes('歌ってみた') || raw.includes('歌みた')) {
        return { kind: 'cover', label: '歌ってみた' };
      }

      if (lowered.includes('live') || lowered.includes('stream') || raw.includes('歌枠') || raw.includes('配信')) {
        return { kind: 'live', label: '' };
      }

      return { kind: 'other', label: '' };
    }

    function kindForFilter(item) {
      const tagText = String(item?.singingTag || item?.memo || '').trim();
      if (tagText) {
        return resolveSingingTag(tagText).kind;
      }
      return normalizeKind(item?.kind);
    }

    function stableSongId(item) {
      const videoId = String(item?.videoId || item?.videoid || item?.video_id || '').trim();
      const title = String(item?.title || '').trim();
      const artist = String(item?.artist || '').trim();
      return [videoId, title, artist].map((part) => encodeURIComponent(part)).join('|');
    }

    function isMobileLayout() {
      return window.matchMedia('(max-width: 768px)').matches;
    }

    function collapseExpandedCards() {
      rows.querySelectorAll('.song-card.expanded').forEach((card) => {
        card.classList.remove('expanded');
      });
    }

    async function copyTextToClipboard(text) {
      const normalized = String(text || '').trim();
      if (!normalized) return false;
      try {
        await navigator.clipboard.writeText(normalized);
        return true;
      } catch (_) {
        try {
          const fallbackInput = document.createElement('textarea');
          fallbackInput.value = normalized;
          fallbackInput.setAttribute('readonly', '');
          fallbackInput.style.position = 'fixed';
          fallbackInput.style.top = '-9999px';
          document.body.appendChild(fallbackInput);
          fallbackInput.focus();
          fallbackInput.select();
          const copied = document.execCommand('copy');
          document.body.removeChild(fallbackInput);
          return copied;
        } catch (_) {
          return false;
        }
      }
    }

    function sortItems(items) {
      const sorted = [...items];
      switch (state.sortMode) {
        case 'artist-asc':
          return sorted.sort((a, b) => String(a.artist || '').localeCompare(String(b.artist || ''), 'ja'));
        case 'artist-desc':
          return sorted.sort((a, b) => String(b.artist || '').localeCompare(String(a.artist || ''), 'ja'));
        case 'title-asc':
          return sorted.sort((a, b) => String(a.title || '').localeCompare(String(b.title || ''), 'ja'));
        case 'title-desc':
          return sorted.sort((a, b) => String(b.title || '').localeCompare(String(a.title || ''), 'ja'));
        case 'date-asc':
          return sorted.sort((a, b) => dateOf(a) - dateOf(b));
        case 'date-desc':
        default:
          return sorted.sort((a, b) => dateOf(b) - dateOf(a));
      }
    }

    function render(items, totals = {}) {
      selectedCount.textContent = String(items.length);
      totalCount.textContent = String(totals.total ?? items.length);

      if (!items.length) {
        rows.innerHTML = '<div class="muted">該当データがありません</div><div class="dummy-end-card">--- END ---</div>';
        rows.dataset.selected = '{}';
        state.selectedSongId = '';
        return;
      }

      rows.innerHTML = items.map((item) => {
        const id = stableSongId(item);
        const detailLinks = linksForExpanded(item);
        const singingTagHtml = detailLinks.singingTagLabel
          ? `<span class="tag">${escapeHtml(detailLinks.singingTagLabel)}</span>`
          : '<span class="muted">-</span>';
        const latestDate = escapeHtml(fmtDate(item.lastSungDate || item.publishedAt));
        const rawLinkTitle = String(item.liveTitle || item.linkLabel || item.lastSungDate || '').trim();
        const fallbackLinkLabel = escapeHtml(rawLinkTitle || 'リンクなし');
        const fallbackLinkTitle = rawLinkTitle
          ? `<a class="song-date-link song-link-title" href="${escapeHtml(encodeURI(detailLinks.detailUrl || ''))}" target="_blank" rel="noopener noreferrer">${escapeHtml(rawLinkTitle)}</a>`
          : '';
        const fallbackLinkHtml = detailLinks.detailUrl
          ? `<span class="song-link-inline"><button class="song-date-link toggle-preview-btn" type="button" data-preview-toggle aria-expanded="false">▶リンクを開く</button>${fallbackLinkTitle}</span>`
          : '<span class="muted">リンクなし</span>';
        const preview = extractVideoPreview(detailLinks.detailUrl);
        const previewHtml = preview
          ? `<div class="song-preview-wrap">
              <a class="song-preview-card song-detail-link" href="${escapeHtml(encodeURI(detailLinks.detailUrl))}" target="_blank" rel="noopener noreferrer" title="${fallbackLinkLabel}">
                <img class="song-preview-image" src="${escapeHtml(preview.thumbnailUrl)}" alt="${escapeHtml(preview.type)}のサムネイル" loading="lazy" referrerpolicy="no-referrer" />
                <p class="song-preview-label">${escapeHtml(preview.type)}</p>
              </a>
            </div>`
          : '';
        return `
          <article class="song-card" data-id="${id}" tabindex="0">
            <div class="song-card-main">
              <div class="song-head">
                <div class="song-summary">
                  <div class="song-title">${escapeHtml(item.title || '-')}</div>
                  <div class="song-artist">${escapeHtml(item.artist || '-')}</div>
                </div>
                <button class="icon-btn copy-text-btn" type="button" data-copy-kind="song-artist" title="楽曲名 / アーティスト名をコピー" aria-label="楽曲名 / アーティスト名をコピー">コピー</button>
              </div>
              <div class="song-details">
                <div class="song-meta">
                  <div class="song-meta-top">
                    <div>${singingTagHtml}</div>
                    <div class="song-meta-latest">Latest: ${latestDate}</div>
                  </div>
                  <div class="song-link-row">${fallbackLinkHtml}</div>
                  ${previewHtml}
                </div>
              </div>
            </div>
          </article>
        `;
      }).join('') + '<div class="dummy-end-card">--- END ---</div>';

      rows.querySelectorAll('.song-card').forEach((el, idx) => {
        const item = items[idx] || {};
        const id = el.dataset.id || '';

        const select = () => {
          state.selectedSongId = id;
          rows.dataset.selected = JSON.stringify(item);
        };

        el.addEventListener('click', async (evt) => {
          const targetEl = eventTargetElement(evt.target);
          const previewToggleButton = targetEl?.closest?.('button[data-preview-toggle]');
          if (previewToggleButton) {
            const willShowPreview = !el.classList.contains('preview-visible');
            el.classList.toggle('preview-visible', willShowPreview);
            previewToggleButton.textContent = willShowPreview ? '▼リンクを閉じる' : '▶リンクを開く';
            previewToggleButton.setAttribute('aria-expanded', String(willShowPreview));
            evt.stopPropagation();
            return;
          }
          const detailLink = targetEl?.closest?.('a.song-detail-link, a.song-date-link');
          if (detailLink) {
            evt.stopPropagation();
            return;
          }
          const copyButton = targetEl?.closest?.('button[data-copy-kind]');
          if (copyButton) {
            evt.preventDefault();
            evt.stopPropagation();
            const title = String(item.title || '').trim();
            const artist = String(item.artist || '').trim();
            const text = [title, artist].filter(Boolean).join(' / ');
            copyTextToClipboard(text).then((copied) => {
              if (copied) {
                showToast('コピーしました');
                setStatus('コピー成功');
                return;
              }
              setStatus('コピー失敗', true);
            });
            return;
          }

          select();
          if (!isMobileLayout()) return;

          const willExpand = !el.classList.contains('expanded');
          collapseExpandedCards();
          if (willExpand) {
            el.classList.add('expanded');
          }
        });

        el.addEventListener('keydown', (evt) => {
          if (isInteractiveTarget(evt.target)) return;
          if (evt.key !== 'Enter' && evt.key !== ' ') return;
          evt.preventDefault();
          select();
        });
      });

      if (!rows.querySelector(`.song-card[data-id="${CSS.escape(state.selectedSongId)}"]`)) {
        const first = rows.querySelector('.song-card');
        if (first) {
          state.selectedSongId = first.dataset.id || '';
          rows.dataset.selected = JSON.stringify(items[0] || {});
        }
      }

      if (!isMobileLayout()) {
        rows.querySelectorAll('.song-card').forEach((card) => card.classList.add('expanded'));
      }
    }

    function filterItems(items) {
      const q = state.q.toLowerCase();
      const kinds = new Set(state.kinds);
      return sortItems(
        items
          .filter((item) => kinds.has(kindForFilter(item)))
          .filter((item) => {
            if (!q) return true;
            const target = [item.title, item.artist, item.memo].filter(Boolean).join(' ').toLowerCase();
            return target.includes(q);
          }),
      );
    }

    const META_FALLBACK_JSON_URLS =
      document.querySelector('meta[name="songs-r2-fallbacks"]')?.content
        ?.split(',')
        .map((v) => v.trim())
        .filter(Boolean)
      || [];

    const SONGS_JSON_URL_OVERRIDE =
      window.__SONGS_JSON_URL__
      || document.querySelector('meta[name="songs-r2-json-url"]')?.content
      || localStorage.getItem('songs_r2_json_url')
      || '';

    const SONGS_JSON_FALLBACK_URLS = Array.from(new Set([
      ...META_FALLBACK_JSON_URLS,
    ]));

    function clearApiCache() {
      try {
        localStorage.removeItem(cacheKey());
      } catch (_) {}
    }

    async function load() {
      setStatus('読込');
      clearErrorLog();

      const cached = loadCache();
      const requestCandidates = [
        SONGS_JSON_URL_OVERRIDE,
        ...SONGS_JSON_FALLBACK_URLS,
      ].filter(Boolean);

      if (requestCandidates.length === 0) {
        const detail = {
          timestamp: new Date().toISOString(),
          errorName: 'MissingSongsJsonUrl',
          statusDescription: 'songs-r2-json-url が未設定',
        };
        setErrorLog(detail);
        rows.innerHTML = '<div class="error">データ取得先が未設定です。meta[name="songs-r2-json-url"] か localStorage("songs_r2_json_url") を設定してください。</div>';
        setStatus('失敗', true);
        return;
      }

      let requestUrl = requestCandidates[0];

      if (cached?.payload?.items) {
        const cachedItems = filterItems(Array.isArray(cached.payload.items) ? cached.payload.items : []);
        render(cachedItems, { total: cached?.payload?.total ?? cachedItems.length });
        setStatus(`キャ${cachedItems.length}`);
      }

      try {
        let res;
        let lastError = null;

        const requestAttemptLogs = [];

        for (const candidateUrl of requestCandidates) {
          requestUrl = candidateUrl;
          try {
            res = await fetch(candidateUrl, {
              headers: cached?.etag ? { 'If-None-Match': cached.etag } : {},
            });
          } catch (fetchErr) {
            lastError = fetchErr;
            requestAttemptLogs.push({ url: candidateUrl, status: 'network_error' });
            continue;
          }

          requestAttemptLogs.push({ url: candidateUrl, status: res.status });

          if (res.ok || res.status === 304) break;

          if (res.status !== 404) {
            const bodyText = await res.text();
            const httpError = new Error(`HTTP ${res.status}`);
            httpError.name = 'HttpResponseError';
            httpError.details = {
              status: res.status,
              statusText: res.statusText,
              headers: headersToObject(res.headers),
              bodyPreview: clipText(bodyText),
              attempts: requestAttemptLogs,
            };
            throw httpError;
          }

          lastError = new Error('HTTP 404');
          lastError.name = 'HttpResponseError';
          lastError.details = { attempts: requestAttemptLogs };
        }

        if (!res) throw lastError || new Error('Fetch failed');

        if (res.status === 304 && cached?.payload) {
          const cachedItems = filterItems(Array.isArray(cached.payload.items) ? cached.payload.items : []);
          render(cachedItems, { total: cached?.payload?.total ?? cachedItems.length });
          setStatus(`通信成功（表示${cachedItems.length}曲）`);
          return;
        }

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        let payload;
        try {
          payload = await res.json();
        } catch (jsonErr) {
          const parseError = new Error('JSON parse failed');
          parseError.name = 'JsonParseError';
          parseError.details = {
            status: res.status,
            statusText: res.statusText,
            headers: headersToObject(res.headers),
          };
          parseError.cause = jsonErr;
          throw parseError;
        }
        const etag = res.headers.get('etag');
        const sourceItems = Array.isArray(payload)
          ? payload
          : (Array.isArray(payload?.items) ? payload.items : []);
        const filteredItems = filterItems(sourceItems);
        render(filteredItems, { total: payload?.total ?? sourceItems.length });
        setStatus(`通信成功（表示${filteredItems.length}曲）`);

        if (etag) saveCache({ etag, payload });
      } catch (err) {
        if (String(err?.message || '').includes('404')) {
          clearApiCache();
        }
        const statusCode = err?.details?.status || (String(err?.message || '').match(/HTTP\s+(\d{3})/)?.[1] ?? null);
        const detail = {
          timestamp: new Date().toISOString(),
          errorName: err?.name || 'Error',
          statusCode,
          statusDescription: '通信エラー',
        };
        setErrorLog(detail);
        if (!cached?.payload) {
          rows.innerHTML = '<div class="error">データ取得に失敗しました。R2の公開URL設定を確認してください。</div>';
        }
        setStatus('失敗', true);
      }
    }

    async function copyMemo() {
      const memoInput = byId('memoInput');
      if (!memoInput) return;
      const copied = await copyTextToClipboard(memoInput.value || '');
      if (!copied) {
        setStatus('コピー失敗', true);
        return;
      }
      showToast('コピーしました');
      setStatus('コピー成功');
    }

    async function copyDanmaku() {
      const type = byId('danmakuType').value;
      const isCustomDanmaku = type.startsWith('custom:');
      if (!isCustomDanmaku && type !== 'my') {
        setStatus('対象なし', true);
        return;
      }

      let text = '';
      if (type === 'my') text = state.myDanmaku || loadMyDanmakuCache();
      if (isCustomDanmaku) text = type.slice('custom:'.length);

      if (!text.trim()) {
        setStatus(
          type === 'my'
            ? '弾幕未設定'
            : '対象なし',
          true,
        );
        return;
      }

      try {
        await navigator.clipboard.writeText(text.trim());
        showToast('弾幕を作成しました');
        setStatus('コピー成功');
      } catch (_) {
        setStatus('コピー失敗', true);
      }
    }

    function toggleKind(kind) {
      const set = new Set(state.kinds);
      if (set.has(kind)) set.delete(kind);
      else set.add(kind);
      state.kinds = [...set];

      if (state.kinds.length === 0) {
        state.kinds = [...DEFAULT_KINDS];
        byId('kindCover').checked = true;
        byId('kindShort').checked = true;
        byId('kindLive').checked = true;
      }
      load();
    }

    function bind() {
      if (!ENABLE_ERROR_LOG_UI) {
        errorLogWrap.hidden = true;
      }

      byId('q').addEventListener('input', (e) => {
        state.q = e.target.value.trim();
        load();
      });

      byId('kindCover').addEventListener('change', () => toggleKind('cover'));
      byId('kindShort').addEventListener('change', () => toggleKind('short'));
      byId('kindLive').addEventListener('change', () => toggleKind('live'));

      byId('sortField').addEventListener('change', (e) => {
        state.sortField = e.target.value;
        state.sortMode = `${state.sortField}-${state.sortOrder}`;
        load();
      });

      byId('sortOrder').addEventListener('change', (e) => {
        state.sortOrder = e.target.value;
        state.sortMode = `${state.sortField}-${state.sortOrder}`;
        load();
      });

      byId('clear').addEventListener('click', () => {
        state.q = '';
        byId('q').value = '';
        load();
      });

      byId('copyDanmaku').addEventListener('click', copyDanmaku);
      byId('copyMemo')?.addEventListener('click', copyMemo);
      if (ENABLE_ERROR_LOG_UI) {
        byId('copyErrorLog').addEventListener('click', copyErrorLog);
      }

      byId('saveMyDanmaku').addEventListener('click', () => {
        const text = buildMyDanmaku(byId('myEmoji').value);
        saveMyDanmakuCache(text);
        byId('danmakuType').value = 'my';
        const select = byId('danmakuType');
        select.classList.remove('roll-highlight');
        void select.offsetWidth;
        select.classList.add('roll-highlight');
        setSwipeCard(0);
        showToast('弾幕を作成しました');
        setStatus('弾幕作成完了');
      });

      const updateTopFormCollapseByScroll = () => {
        const topForm = byId('topForm');
        if (!topForm || !isMobileLayout()) return;
        if (getTopSwipeCard() === 1) return;

        const currentScrollTop = rows?.scrollTop ?? window.scrollY;
        const shouldCollapse = currentScrollTop > 72;
        if (shouldCollapse === topFormCollapsedByScroll) return;

        topForm.classList.toggle('collapsed', shouldCollapse);
        topFormCollapsedByScroll = shouldCollapse;
        syncTopPanelSize();
      };

      const updateScrollTopOffset = () => {
        const container = byId('songsPage');
        const bottomForm = document.querySelector('.bottom-form');
        if (!bottomForm || !container) return;

        const containerRect = container.getBoundingClientRect();
        bottomForm.style.left = `${Math.round(containerRect.left)}px`;
        bottomForm.style.width = `${Math.round(containerRect.width)}px`;

        const rect = bottomForm.getBoundingClientRect();
        const overlap = Math.max(0, window.innerHeight - rect.top);
        const offset = overlap > 0 ? overlap + 8 : 0;
        document.documentElement.style.setProperty('--scroll-top-offset', `${offset}px`);
        updateMiddleCardsHeight();
        updateDummyEndCardHeight();
        syncTopPanelSize();
      };

      byId('scrollTop').addEventListener('click', () => {
        if (rows && rows.scrollTop > 0) {
          rows.scrollTo({ top: 0, behavior: 'smooth' });
          return;
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });

      let lastBubbleAt = 0;
      let previousRowsScrollTop = 0;
      const maybeBubble = () => {
        const now = Date.now();
        if (now - lastBubbleAt < 120) return;
        lastBubbleAt = now;
        createScrollBubbles();
      };

      window.addEventListener('scroll', () => {
        updateTopFormCollapseByScroll();
        const scrollTopValue = Math.max(window.scrollY, rows?.scrollTop ?? 0);
        byId('scrollTop').classList.toggle('show', scrollTopValue > 280);
        updateScrollTopOffset();
        maybeBubble();
      });

      window.addEventListener('resize', updateScrollTopOffset);

      rows.addEventListener('scroll', () => {
        const cardSample = rows.querySelector('.song-card');
        const rowGap = Number.parseFloat(window.getComputedStyle(rows).rowGap || '0') || 0;
        const cardHeight = cardSample ? (cardSample.offsetHeight + rowGap) : 44;
        const deltaRows = Math.abs(rows.scrollTop - previousRowsScrollTop) / Math.max(1, cardHeight);
        previousRowsScrollTop = rows.scrollTop;

        if (deltaRows >= 10) {
          createScrollBubbles('burst');
        } else {
          maybeBubble();
        }

        updateTopFormCollapseByScroll();
        const scrollTopValue = Math.max(window.scrollY, rows.scrollTop);
        byId('scrollTop').classList.toggle('show', scrollTopValue > 280);
        collapseExpandedWhenOutOfView();
      });


      const media = window.matchMedia('(max-width: 768px)');
      media.addEventListener('change', () => {
        collapseExpandedCards();
        if (!isMobileLayout()) {
          rows.querySelectorAll('.song-card').forEach((card) => card.classList.add('expanded'));
        }
        updateScrollTopOffset();
      });

      updateScrollTopOffset();
      updateMiddleCardsHeight();
      updateTopFormCollapseByScroll();
    }

    byId('sortField').value = state.sortField;
    byId('sortOrder').value = state.sortOrder;
    state.sortMode = `${state.sortField}-${state.sortOrder}`;

    bind();
    setupTopSwipe();
    setupBottomSwipe();
    state.myDanmaku = loadMyDanmakuCache();
    if (!state.myDanmaku) triggerSwipeHint();
    if (!swipeHintIntervalId) {
      swipeHintIntervalId = window.setInterval(() => {
        if (!loadMyDanmakuCache()) triggerSwipeHint();
      }, SWIPE_HINT_INTERVAL_MS);
    }
    load();
  </script>
</body>
</html>
