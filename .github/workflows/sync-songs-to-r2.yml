name: Sync songs.json to Cloudflare R2

on:
  workflow_dispatch:
  schedule:
    # JST 12:00 = UTC 03:00
    - cron: '0 3 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_OBJECT_KEY: ${{ secrets.R2_OBJECT_KEY }}
          GAS_SONGS_API_URL: ${{ secrets.GAS_SONGS_API_URL || 'https://script.google.com/macros/s/AKfycbyMD58NPs-RUi24wiP0AZSPziHEgNj0RPmC3_HM65hSMhQ6J4lF0cj51NtBDrFd3Kqa/exec?api=songs' }}
        run: |
          set -euo pipefail

          access_key="${R2_ACCESS_KEY_ID:-${AWS_ACCESS_KEY_ID:-}}"
          secret_key="${R2_SECRET_ACCESS_KEY:-${AWS_SECRET_ACCESS_KEY:-}}"

          if [[ -z "$access_key" || -z "$secret_key" ]]; then
            echo "Missing credentials. Set either R2_ACCESS_KEY_ID/R2_SECRET_ACCESS_KEY or AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY secrets." >&2
            exit 1
          fi

          missing_vars=()
          [[ -z "${R2_ACCOUNT_ID:-}" ]] && missing_vars+=("R2_ACCOUNT_ID")
          [[ -z "${R2_BUCKET:-}" ]] && missing_vars+=("R2_BUCKET")
          [[ -z "${R2_OBJECT_KEY:-}" ]] && missing_vars+=("R2_OBJECT_KEY")

          if (( ${#missing_vars[@]} > 0 )); then
            echo "Missing required R2 config secrets: ${missing_vars[*]}" >&2
            exit 1
          fi

          if [[ -z "${GAS_SONGS_API_URL:-}" ]]; then
            echo "GAS_SONGS_API_URL is empty." >&2
            exit 1
          fi

          if [[ "$GAS_SONGS_API_URL" != http* ]]; then
            echo "GAS_SONGS_API_URL must start with http/https: $GAS_SONGS_API_URL" >&2
            exit 1
          fi

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Sync songs.json to R2
        env:
          GAS_SONGS_API_URL: ${{ secrets.GAS_SONGS_API_URL || 'https://script.google.com/macros/s/AKfycbyMD58NPs-RUi24wiP0AZSPziHEgNj0RPmC3_HM65hSMhQ6J4lF0cj51NtBDrFd3Kqa/exec?api=songs' }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_OBJECT_KEY: ${{ secrets.R2_OBJECT_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID || secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY || secrets.AWS_SECRET_ACCESS_KEY }}
          # Cloudflare R2 upload uses endpoint-url and static credentials.
          # Keep AWS SDK/CLI region on a real AWS region value to avoid
          # accidental lookups such as sts.auto.amazonaws.com.
          AWS_REGION: us-east-1
          AWS_DEFAULT_REGION: us-east-1
          R2_ENDPOINT_URL: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL || 'https://pub-e333d72512c24eb290119f7f2e0e4bdf.r2.dev' }}
        run: bash scripts/sync_songs_to_r2.sh
